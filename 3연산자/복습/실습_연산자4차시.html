<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>연산자 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 논리 연산자

    - && (그리고) : 양쪽이 모두 true 일 때만 true
    - || (또는)   : 한쪽만 true 여도 true
    - !  (부정)   : true 는 false 로, false 는 true 로 뒤집음
    - 주의 : && 와 || 는 반드시 두 개씩 (하나면 다른 동작)
    - 여러 조건을 한 번에 판단할 때 사용 (예: 체력 있고 물약도 있고)
*/

// [1] 'hp' 에 80, 'hasPotion' 에 true 를 저장하세요.
//     작성 공식: let 변수이름 = 값;
let hp = 80;
let hasPotion = true;

// [2] hp 가 100 미만이고(&&) 물약이 있는지 비교해 출력하세요.
//     작성 공식: console.log(조건1 && 조건2);
console.log(hp < 100 && hasPotion);     // 출력: true

// [3] hp 가 0보다 크고(&&) 100 이하인지 출력하세요.
console.log(hp > 0 && hp <= 100);       // 출력: true

// [4] hp 가 200 초과거나(||) 물약이 있는지 출력하세요.
//     작성 공식: console.log(조건1 || 조건2);
console.log(hp > 200 || hasPotion);     // 출력: true

// [5] 물약 보유(hasPotion)를 부정해서 출력하세요. (!)
//     작성 공식: console.log(!값);
console.log(!hasPotion);                // 출력: false

// [6] 'level' 에 10, 'gold' 에 500을 저장하세요.
let level = 10;
let gold = 500;

// [7] 레벨 10 이상이고(&&) 골드 1000 이상인지 출력하세요. (장비 구매 가능?)
console.log(level >= 10 && gold >= 1000);   // 출력: false

// [8] 'isAlive' 에 true, 'isPoisoned' 에 false 를 저장하세요.
let isAlive = true;
let isPoisoned = false;

// [9] 살아있고(&&) 중독이 아닌지(!) 출력하세요.
console.log(isAlive && !isPoisoned);    // 출력: true

// [10] level 이 5 이상이거나 gold 가 0인지 출력하세요. (||)
console.log(level >= 5 || gold === 0);  // 출력: true
</script>
</body>
</html>
