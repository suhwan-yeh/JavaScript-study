<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>연산자 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 대입 연산자 (값 누적)

    - = : 오른쪽 값을 변수에 저장(대입)

    - 복합 대입 연산자 : 기존 값에 연산해서 다시 저장 (짧게 쓰는 법)

        +=     -=     *=    /=     %=
        · hp += 10  은  hp = hp + 10  과 같음
        · hp -= 20  은  hp = hp - 20  과 같음
        · gold *= 2 는  gold = gold * 2 와 같음
    - 게임에서 체력 회복/감소, 골드 증가 등에 자주 사용
*/

// [1] 'hp' 변수에 100을 저장하세요.
//     작성 공식: let 변수이름 = 값;
let hp = 100;

// [2] 포션을 먹어 hp 를 20 늘리세요. (복합 대입 +=)
//     작성 공식: 변수 += 값;
hp += 20;    //-------------------->  hp = hp + 20;
//연산순서1.  hp  +  20
//          100  +  20
//             120
//연산순서2. hp =  120
//            120

// [3] hp 를 출력하세요.
console.log(hp); //120

// [4] 데미지를 입어 hp 를 50 줄이세요. (복합 대입 -=)
//     작성 공식: 변수 -= 값;
   hp  -= 50;
// 120 -= 50;
//연산순서1.   hp - 50 -> 70
//연산순서2.   hp = 70;

// [5] hp 를 출력하세요.
console.log(hp); //70

// [6] 'gold' 변수에 100을 저장하세요.
let gold = 100;

// [7] 골드가 2배가 되었습니다! gold 를 2배로 만드세요. (복합 대입 *=)
//     작성 공식: 변수 *= 값;
gold *= 2;

//위 식을 풀어서 해석하면 아래와 같다.
// gold = gold * 2;
// 100  = 100  * 2;
// 100  =    200;
// 200

// [8] gold 를 출력하세요.
console.log(gold);  //200

// [9] 'score' 변수에 0을 저장하세요.
let score = 0;

// [10] 점수를 10씩 세 번 올리세요. (+= 를 세 번)
   score += 10;
// 10
   score += 10;
// 20
   score += 10;
// 30      

// [11] score 를 출력하세요.
    console.log(score);   //30

</script>
</body>
</html>
