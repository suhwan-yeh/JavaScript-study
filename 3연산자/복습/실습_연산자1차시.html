<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>연산자 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 산술 연산자

    - 더하기 +, 빼기 -, 곱하기 *, 나누기 /
    - 나머지 % : 나눈 나머지 (짝수/홀수, 반복 주기 판단)
    - 계산 결과는 변수에 저장해 재사용
    - 괄호 ( ) 로 계산 순서를 정할 수 있음 (수학과 동일)
*/

// [1] 'price'(가격)에 1500, 'count'(개수)에 3을 저장하세요.
//     작성 공식: let 변수이름 = 값;
let price = 1500;
let count = 3;

// [2] 총액 = 가격 * 개수 를 계산해 'total' 에 저장하세요.
//     작성 공식: let 변수 = 값1 * 값2;
let total = price * count;
//        = 1500  *  3;
//  4500

// [3] total 을 출력하세요.
console.log(total); //4500

// [4] 'attack'(공격력)에 50을 저장하세요.
let attack = 50;

// [5] 공격을 3번 했을 때 총 데미지(공격력 * 3)를 출력하세요.
console.log( attack  *  3 );  // 150

// [6] 'totalGold' 에 1000, 'players' 에 4를 저장하세요.
let totalGold = 1000;
let players = 4;

// [7] 골드를 인원수로 나눠 1인당 골드를 출력하세요.
console.log( totalGold /  players );
//             1000    /    4    
//                    250

// [8] 'turn' 에 7을 저장하세요.
let turn = 7;

// [9] turn 을 2로 나눈 나머지를 출력하세요. (1이면 홀수 턴)
//     작성 공식: console.log(값 % 2);
console.log( turn  % 2 );
//            7    % 2
//     해석 :  7을 2로 나눈 나머지값 구해라 !
//     결과 :  나머지  1 

// [10]   (10 + 20) * 2 를 괄호를 사용해 계산해 출력하세요.
// 순서1.  (10 + 20)    -> 30
// 순서2.     (30)   * 2 -> 60

console.log(  (10 + 20) * 2  );   // 60 


</script>
</body>
</html>
