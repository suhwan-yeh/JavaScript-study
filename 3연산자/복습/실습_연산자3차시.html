<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>연산자 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : 비교 연산자 (=== 가 핵심)

    - =   : 대입 연산자. 변수에 값을 저장
    - === : 비교 연산자. 두 값이 같은지 확인 → 결과는 true/false
    - !== : 두 값이 다른지 확인
    - >  <  >=  <= : 대소 비교
    - 비교에 = 하나를 쓰면 '대입'이 되어 버그가 납니다. 비교는 꼭 ===
*/

// [1] 'hp' 변수에 100을 저장하세요. (여기서 = 는 '대입')
//     작성 공식: let 변수이름 = 값;
let hp = 100;

// [2] hp 가 100과 같은지 비교해 출력하세요. (=== 등호 3개)
//     작성 공식: console.log(값1 === 값2);
console.log(hp === 100);       // 출력: true

// [3] hp 가 50과 같은지 비교해 출력하세요.
console.log(hp === 50);        // 출력: false

// [4] hp 가 50과 다른지 비교해 출력하세요. (!==)
console.log(hp !== 50);        // 출력: true

// [5] hp 가 50보다 큰지 비교해 출력하세요. (>)
console.log(hp > 50);          // 출력: true

// [6] hp 가 200보다 작거나 같은지 비교해 출력하세요. (<=)
console.log(hp <= 200);        // 출력: true

// [7] 'level' 에 5, 'enemyLevel' 에 5를 저장하세요.
let level = 5;
let enemyLevel = 5;

// [8] 두 레벨이 같은지 비교해 출력하세요.
console.log(level === enemyLevel);   // 출력: true

// [9] 'myName' 에 "기사", 'inputName' 에 "기사"를 저장하세요.
let myName = "기사";
let inputName = "기사";

// [10] 두 문자열이 같은지 비교해 출력하세요. (문자열도 === 로 비교)
console.log(myName === inputName);   // 출력: true
</script>
</body>
</html>
