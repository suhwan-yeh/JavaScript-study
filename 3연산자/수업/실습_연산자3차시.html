<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 연산자 3차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 공격 가능 판정</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : 논리 연산자

    - && (그리고) : 양쪽 모두 true 여야 true
    - || (또는)   : 한쪽만 true 여도 true
    - !  (부정)   : true↔false 뒤집기
    - 여러 조건을 한 번에 판단할 때 사용
*/

// [1] 'hp' 에 80, 'mp' 에 30을 저장하세요.
//     작성 공식: let 변수이름 = 값;
let hp = 80;
let mp = 30;

// [2] hp 가 0보다 크고(&&) mp 가 20 이상인지 출력하세요. (스킬 사용 가능?)
//     작성 공식: console.log(조건1 && 조건2);
console.log( hp > 0  &&  mp >= 20);
//           80 > 0  &&  30 >= 20
//             true  &&    true
//                  true 

// [3] hp 가 100 이상이거나(||) mp 가 50 이상인지 출력하세요.
//     작성 공식: console.log(조건1 || 조건2);
console.log(hp >= 100 || mp >= 50);
//          80 >= 100 || 30 >= 50
//             false  ||    false
//                   false

// [4] 'isAlive' 에 true, 'isPoisoned' 에 false 를 저장하세요.
let isAlive = true,  isPoisoned = false;

// [5] 살아있고(&&) 중독이 아닌지(!) 출력하세요.
//     작성 공식: console.log(값1 && !값2);
console.log(isAlive && !isPoisoned);
//            true  && !false
//            true  &&   true
//                  true


// [6] isPoisoned 를 부정해서 출력하세요. (!)
//     작성 공식: console.log(!값);
console.log(!isPoisoned);
//          !false
//           true

// [7] 'level' 에 10, 'gold' 에 500을 저장하세요.
let level = 10,  gold = 500;

// [8] 레벨 10 이상이고(&&) 골드 1000 이상인지 출력하세요. (장비 구매?)
console.log(  level >= 10  &&  gold >= 1000);
//              10  >= 10  &&  500  >= 1000
//                  true   &&      false
//                         false 

// [9] 레벨 5 이상이거나(||) 골드 0인지 출력하세요.
console.log( level >= 5 || gold === 0  );
//            10   >= 5 ||  500 === 0
//                true  ||     false
//                      true 

  </script></body></html>
