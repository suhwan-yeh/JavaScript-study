<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 연산자 2차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 레벨 판정</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : 비교 연산자와 대입 연산자

    - 비교 : >  <  >=  <=  ===  !==  → 결과는 true/false
    - 복합 대입 : hp += 10 은 hp = hp + 10 과 같음
        · += 더해서 저장, -= 빼서 저장, *= 곱해서 저장
*/

// [1] 'level' 변수에 5를 저장하세요.
//     작성 공식: let 변수이름 = 값;
let level = 5;

// [2] level 이 10 이상인지 비교해 출력하세요.
//     작성 공식: console.log(값 >= 값);
console.log( level >= 10);
        //    5    >= 10    식을 컴퓨터에게 물어보면 컴퓨터는 5가 더 작음을 판단해서  개발자에게  fasle 거짓 값 보여준다.

// [3] 레벨업! level 을 3 늘리세요. (복합 대입 +=)
//     작성 공식: 변수 += 값;
level += 3;    //->  level = level + 3;

// [4] level 을 출력하세요.
console.log(level);  //8

// [5] level 이 8과 같은지 비교해 출력하세요. (===)
console.log( level === 8 );  // true

// [6] 'hp' 변수에 100을 저장하세요.
let hp = 100;

// [7] 데미지를 입어 hp 를 30 줄이세요. (복합 대입 -=)
//     작성 공식: 변수 -= 값;
hp -= 30;    //->   hp = hp - 30;
//70

// [8] hp 를 출력하세요.
console.log(hp);   //70

// [9] 'gold' 변수에 100을 저장하고, 2배로 만드세요. (복합 대입 *=)
//     작성 공식: 변수 *= 값;
let gold = 100;
gold *= 2;      //  gold = gold * 2;

// [10] gold 를 출력하세요.
console.log(gold);  //200
  </script></body></html>
