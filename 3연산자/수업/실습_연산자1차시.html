<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 연산자 1차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 전투 계산기</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요.</div>
  <script>
/*
    주제 : 산술 연산자

    - 더하기 +, 빼기 -, 곱하기 *, 나누기 /, 나머지 %
    - 곱하기는 * (별표), 괄호로 순서 지정 가능
    - 계산 결과를 변수에 저장해 재사용
*/

// [1] 'attack'(공격력)에 60, 'defense'(방어력)에 10을 저장하세요.
//     작성 공식: let 변수이름 = 값;
let attack = 60;    let defense = 10;

// [2] 데미지 = 공격력 - 방어력 을 계산해 'damage' 에 저장하세요.
//     작성 공식: let 변수 = 값1 - 값2;
let damage =  attack - defense;
//         =   60    - 10;
//   50

// [3] damage 를 출력하세요.
console.log(damage);  //50

// [4] 3연속 공격의 총 데미지(damage * 3)를 출력하세요.
//     작성 공식: console.log(값1 * 값2);
console.log(damage * 3); //150

// [5] 'totalExp' 에 500, 'count' 에 5를 저장하세요.
let totalExp = 500;   let count  = 5;

// [6] 경험치를 인원수로 나눈 값을 출력하세요.
console.log( totalExp / count  );  // 100

// [7] (10 + 20) * 2 를 괄호로 계산해 출력하세요.
//     작성 공식: console.log((값 + 값) * 값);
console.log( (10 + 20) * 2  );
//           (   30  )
//           (   30  ) * 2
//                  60 

// [8] 7을 2로 나눈 나머지를 출력하세요.
//     작성 공식: console.log(값 % 값);
console.log(  7 % 2  );   // 1


  </script></body></html>
