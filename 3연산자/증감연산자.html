<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            예를 들어 num1변수메모리에 10이 저장되어 있다고 가정하자
            num1변수메모리에 저장된 10을 1차감한 9로 만들어 만든 9를 다시 num1변수에 저장시키는식?

            let num1 = 10;

            num1 = num1 - 1;
            10   =  10  - 1;
            10   =     9;
            9
           ------------------------------------------------------------------------------
            위 num1 = num1 - 1; 식보다 더 짧게 작성할수 있는 식?

            num1 -= 1;
         */
         let num1 = 10;   let num2 = 20;    let result; //계산할 결과값 저장할 변수 
       
         //num1변수에 저장된 10을 1감소 시킨 9를 다시~~ num1변수에 대입해서 저장
         num1--;  // 풀어서 작성하면? num1 = num1 - 1;  또는  num1 -= 1;

         //변수명--;  요약 : 변수에 저장된 값을 1감소시킨 후 그값을 다시 변수에 저장

         document.write(num1 ,"<br>"); // 9<br>

         //------- num1 = 9; 현재 저장되어 있음

         //num1변수에 저장된 9를 1증가 시킨 10을 다시~~ num1변수에 대입해서 저장
         num1++;  //풀어서 작성하면? num1 = num1 + 1;   또는 num1 += 1;

         //변수명++;  요약 : 변수에 저장된 값을 1증가시킨 후!  그값을 다시 변수에 저장

         document.write(num1, "<br>"); //10<br>

         //--------- num2 = 20; 현재 저장되어 있음
         
         result = num2++;
       //[    ] = [20]++;
       //해석 : ++ 후위 증가 연산자가 변수명 뒤에 작성했을떄는
       //      먼저! num2변수에 저장된 값을 먼저 사용! 한 후 num2변수의 값을 나중에 1증가 시켜 버립니다.
       //      먼저! 변수 result에  num2변수에 저장된 20을 저장한 후에!
       //      num2변수에 저장된 20을 1증가시켜 21로 만들어 다시 저장합니다.
       
         document.write(result, "<br>");  //20
         document.write(num2, "<br>");    //21

      //result -> 20,  num2 -> 21

        result = ++num2;
       //[20]  = ++[21];
       //[20]  =  22;
       //[22]
       
       //해석 :  ++ 전위 증가 연산자가 변수명 앞에 있을때
       //       먼저! num2변수에 저장된 값 21을 1증가 시킨 22로 만들어 준다.
       //       그리고! 변수 result에 num2변수값 22를 = 대입해서 저장시킨다.

       //result -> 22  , num2 -> 22

       document.write(result, "&nbsp;&nbsp;", num2 )


    </script>
    
</body>
</html>
