    <!-- 자바스크립트 코드를 작성 하는 영역의 태그 =  <script>선언문 태그  -->
    <script>
        //주제 : 복합대입 연산자 기호들 사용
        //       +=   -=  /=   %=  *=

        let number = 10;

        //문제 : number변수에 저장된 10을 20으로 만들어 저장시키려면?
        //가장 쉬운 방법1 :  number  = 20;  을 작성해서 저장시키면  10은 삭제가 되고 20이 최종 하나 저장됨

        //방법2 : number변수에 저장된 10에  + 10을 해서 20으로 만든뒤 20을 number변수에 다시 저장 하면 된다.
        number = number + 10;
        //     =  10    + 10;
        //     =      20;
        //20
        //연산 순서1.  number + 10 먼저 계산해서 20을 만들어 줍니다.
        //연산 순서2.  만든 20을  = 대입연산자를 이용해서  number변수에 대입해서 저장 

        //----------> 현재 이줄에서는 number변수에 저장된 값이 20인 상태에서 아랫줄에서 계산 해야 한다.
        //let number = 20;

        //방법3 : 복합대입 연산자 += 를 이용해서 number변수에 저장된 20을 30으로 저장할수 있다.
        number += 10; //<--- 풀어서 작성하면? number = number + 10; 와 같다.

        //연산 순서1. number변수에 저장된 20에  + 10을 하여 30으로 만들어 줍니다.
        //         -> number + 10;
        //         ->   20   + 10;
        //         ->       30;

        //연산 순서2. 만든 30을  = 대입연산자를 이용해서 앞에 작성한 number변수에 대입해서 최종 저장시킵니다.
        //         -> number = number + 10;
        //              20   =     30;
        //              30

        document.write(number, "<br>"); //30<br>

        //-------------> 현재 코드 줄의 위치에서 number변수에 저장 되어 있는 값  :  30 
        //let number = 30;

        //문제 : number변수에 저장된 값을 10 차감해서 다시 저장
        number -= 10;  //풀어서 작성하면?  number = number - 10;
        //연산순서1.  number - 10
        //            30    - 10 -> 20
        //연산순서2.  만든 20을 = 대입연산자 기호가 작동해서 앞에 작성한 number변수에 20을 투입해서 최종 저장
        //           number = 20

        document.write(number, "<br>"); //20<br>

        //-------------> 현재 코드 줄의 위치에서 number변수에 저장 되어 있는 값  :  20 
        //문제 : number 변수에  number변수에 저장된 값에 10을 곱해서  다시 최종 저장
        number = number * 10;
        // 20  =  20    * 10;
        // 20  =      200;
        //200
        
        //바로 위 식을 줄여 작성 하면  number *= 10; 과 같다.
        document.write(number, "<br>"); // 200<br>

        //-------------> 현재 코드 줄의 위치에서 number변수에 저장 되어 있는 값  :  200
        //let number = 200;

        //문제 : number변수에 저장된 200을 10으로 나눈 몫을  = 대입연산자를 이용해 다시 number변수에 최종 저장
        number  /= 10;   // 풀어서 작성하면?  number = number / 10;
        //연산순서1. number / 10;
        //           200  / 10;
        //               20;
        //연산순서2. 만든 20을 = 대입연산자를 사용해 최종 number변수에 저장 !
        //          number = 20;

        document.write(number, "<br>");  // 20<br>

        //-------------> 현재 코드 줄의 위치에서 number변수에 저장 되어 있는 값  :  20
        //let number = 20;   

        //문제 : number변수에 저장된 20을 10으로 나눈 나머지값 0을 구해서 number변수에 다시 최종 저장
        number %= 10;   //풀어서 작성하면?  number = nubmer % 10;
        //연산순서1.  number % 10;
        //            20   %  10;
        //                0;
        //연산순서2. 구한 나머지값 0을   = 대입연산자가 사용되어 number변수에 최종 저장
        //          number = 0;
        document.write(number); // 0

    </script>
