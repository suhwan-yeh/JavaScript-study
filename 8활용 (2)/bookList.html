<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/bookList.css">
</head>
<body>
    <div id="container">
        <h1>Book List</h1>
        <form>
            <ul id="bookInfo">
                <li>
                    <label for="title">제 목</label>
                    <input type="text" id="title">
                </li>
                <li>
                    <label for="author">저 자</label>
                    <input type="text" id="author">
                </li>
            </ul>
            <button type="reset">취소하기</button>
            <button  id="save">저장하기</button>
        </form>

        <!--정보가 표시될 영역 -->
        <ul id="bookList"></ul>
    </div>

    <script type="text/Javascript">
        //1. 책 제목을 입력하는 <input type="text" id="title"> 요소 선택
        const title = document.querySelector("#title");

        //2. 책 저자명을 입력하는 <input type="text" id="author"> 요소 선택
        const author = document.querySelector("#author");

        //3. <button id="save">저장하기</button> 요소 선택
        const save = document.querySelector("#save");

        //4. 정보가 표시될 영역 <ul id="bookList"></ul> 요소 선택
        const bookList = document.querySelector("#bookList");

        //5. <button id="save">저장하기</button> 요소에 click이벤트 등록 후 처리 
        save.addEventListener("click", (e)=>{
            /*
            저장하기 버튼 <button id="save">저장하기<button> 요소에는
            기본적으로 <form></form>사이에 작성되어 있기때문에 submit기본이벤트가 적용되어 있다.
            <form>의 의해 전송요청을 차단하기 위해 e매개변수의event객체의 preventDefault()메소드로 submit이벤트 차단 
            참고. 가장 위줄에 작성 해야 아래줄의 코드가 작동됩니다.
            */
            e.preventDefault();

            //입력 한 책 제목과  저자 정보를 텍스트노드로 하는 li 요소노드 생성
            const item = document.createElement("li");
            //  <li></li>

            item.innerHTML = `${title.value} - ${author.value} <span class="delButton">삭제</span>`;
            /*
                <li>
                    자바책 - 저자명
                    <span class="delButton">삭제</span>
                </li>    
            */
            
            //<ul id="bookList"></ul> 사이에 새로 생성된 바로위 <li>....</li>한쌍을 자식노드로 추가 
            bookList.appendChild(item);
            /*
                <ul id="bookList"> <--------------------------- 기존에 위에 만들어져 있던 요소 
                    
                    <li> <-------------------------------------- 자바스크립트 코드에 의해 만들어진 동적요소 
                        자바책 - 저자명
                        <span class="delButton">삭제</span>
                    </li>    
                
                </ul>    
            */

            //책 제목 입력하는 <input>에 입력된 값 대신 ""빈공백문자열 설정 하여 다른 책제목을 입력할수 있도록 유도
            title.value = "";
            //저자 명 입력하는 <input>에 입력된 값 대신 ""빈공백문자열 설정 하여 다른 저자명을 입력할수 있도록 유도
            author.value = "";

            //동적으로 생성한 <span class="delButton">삭제</span> 모두를 배열에 담아 선택해 옴
            const delButtons = document.querySelectorAll(".delButton");

            //[ <span class="delButton">삭제</span>, <span class="delButton">삭제</span> ]
            //                          0          ,                    1               index

            //delButtons 배열에 저장된 span을 차례대로 반복해서 얻어 click이벤트 등록하고 처리 
            for(let delButton of delButtons){

                delButton.addEventListener("click",function(){

                    //해석1. this -> click 이벤트가 발생한 span요소 하나 
                    //해석2. this.parentNode ->  click 이벤트가 발생한 span의 상위 li요소 하나 
                    let list = this.parentNode;

                    //해석3.this.parentNode.parentNode -> click이벤트가 발생한 span의 상위 li의 상위 ul요소 하나 
                    //해석4.this.parentNode.parentNode.removeChild(<li>..</li>);
                    //-> click 이벤트가 발생한 span의 상위 li의 상위 ul 사이에 작성된 자식 <li></li> 삭제 
                    list.parentNode.removeChild(list);
                });
            }
        });

    </script>


</body>
</html>
