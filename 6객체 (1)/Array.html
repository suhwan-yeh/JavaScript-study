<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 주제 : Array객체의 from() 메소드의 사용법  -->
    <script>
        //1. 유사배열객체
        //-  유사배열객체는  length속성을 가지며 index번호로 요소에 접근할수 있는 배열객체
        const arrayLike =  {  0:'a',   1:'b',  2:'c',   length:3 };

        //유사배열객체를 일반배열로 변환 하자
        const arr = Array.from( arrayLike ); //->  [ 'a',  'b',  'c'  ]  일반배열을 생성해서 반환
                                            //       0     1     2    <- index

        //일반배열에 각 칸에 저장된 'a', 'b', 'c' 문자를 반복해서 얻어 출력
        arr.forEach(function(charValue){

            document.write(charValue, "<br>");    

        });                                    


        //2. 반복가능한 객체 
        // -  반복가능한 객체는 Symbol.itarator메소드를  가진 객체 입니다
        const set = new Set(['a', 'b', 'c']);

        //반복가능한 객체를 일반배열로 변환
        const arr2 = Array.from(set);   //->  ['a', 'b', 'c']  일반배열로 반환

        console.log( JSON.stringify(arr2) );

	    //결론
	    //Array객체의 from메소드를 사용하면 NodeList유사배열을 실제일반배열로 변환하여
	    //일반 배열의 forEach, map, find 등의 메서드를 사용할수 있습니다. 
	    //이를 통해 중간에 노드를 삭제하더라도 안전하게 순회할수 있습니다. 

    </script>
</body>
</html>
