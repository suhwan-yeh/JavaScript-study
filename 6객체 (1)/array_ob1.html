<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <script>
         /*
            변수 메모리 
            - 하나의 데이터를 저장할 전체 메모리 공간
            예) let 변수명;
                | undefiend |

                변수명        = 데이터;
                |   데이터   |

                변수명        = 데이터2;
                |   데이터2  |
            - 결론  :  하나의 데이터만 저장할 하나의 메모리 공간


            배열 객체 메모리 (Array)
             - 하나의 메모리에 칸을 나누어서 하나 이상의 데이터를 함께 저장시킬 전체 메모리 공간
             - 예)   [ 1,  2,  3,  4 ]; <-- 하나의 배열 메모리(Array)공간     
            
                이때  각 칸에 저장된 1 또는  2또는  3또는 4등의 데이터를 요소라고 부른다.
             - 배열 메모리는 각 칸의 데이터에 접근하거나 저장된 데이터를 불러오거나
               각 칸에 저장된 데이터를 변경하기 위해 각 칸 위치에 번호가 0 부터 ~ 1씩 증가하면서 붙게 되는데..
               이번호를 index라고 부릅니다.
                    [ 1,   2,  3,   4  ];  <-- 하나의 배열 메모리 전체 공간
                      0    1   2    3   <-- index  

            -  배열 메모리의 각 칸에 저장된 데이터(요소)는 index번호를 사용하여 각요소에 접근하며
               배열 메모리에 어떤 데이터 유형(문자열, 숫자, 객체, 다른배열)이든 추가 저장, 삭제할수 있습니다.

            -  자바스크립트 배열 메모리는 동적배열로,  크기가 (칸의 갯수가)자동으로 조절됨
            
            -  자바스크립트 배열 메모리(Array)다양한 내장메소드(함수)와 속성(변수)등을 제공함
              예) length 속성,  push()메소드,  shift()메소드, unshifht()메소드 등.... 
            
        ------------------------------------------------------------------------------------

            배열 메모리 생성 방법 2가지

                방법1.  리터럴 표기법  [    ] 대괄호 이용
                                                                     배열 Array 메모리 주소번지 0x16

                        let  배열_메모리의_주소번지가_저장된_참조변수명 = [ "저장값1",  저장값2,  저장값3 ];

                                                        | 0x16  | =     0         1         2      index

                    예)                             let  colors  = [    "Red",  "Green",  "Blue" ];
                                                                        0          1        2       index 


                방법2.  Array생성함수(생성자)를 이용 

                                                                        배열 Array 메모리 주소번지 0x17

                        let 배열_메모리의_주소번지가_저장된_참조변수명 = new Array("저장값1", 저장값2, 저장값3);

                                                        | 0x17 | =              0        1       2     index

                                                 예) let  colors = new Array("Red",  "Green",   "Blue");

                                                                                0         1      2     index

                            단점 :  과도한 new키워를 사용해야 하므로, 코드가 다소 장황해 질수 있습니다
		                           혼동 가능성 있음
		                      예) 만약 하나의 숫자인자를 전달하면, 해당 숫자를 길이로 가지는
		                          비어있는 칸의 배열이 생성됩니다.
		                          예를 들어  new Array(3) 은 길이가 3인 비어 있는 배열을 생성하게됨


            두 배열 메모리 생성 방법 요약

                1. 리터럴 표기법 [ ] 방법은 배열메모리를 더 쉽고 빠르게 만들수 있는 방법.
                   코드가 간결하고 가독성이 띄어 납니다. <----현업에서 사용

                2. new Array(); 생성자 함수 호출 방법은  배열 메모리를 생성하는 방법이긴 하지만,
                   사용시 주의가 필요하며  코드가 다소 복잡해 질수 있습니다.
                   
                결론 : 일반적으로 리터럴 표기법 [ ] 방법으로 배열 메모리를 생성해서 사용하는 걸 권장함.   

        --------------------------------------------------------------------------------------------

                생성된 배열 메모리의  각 index 위치 번호의 칸에 저장된 요소(데이터)를 불러와 사용하는 방법

                        방법.  배열_메모리의_주소가 저장된 변수명[index];

                                                    배열 메모리 주소 0x16

                             예)  let colors = ["Red",   "Green",    "Blue"];
                                    | 0x16 |     0         1           2     <-----index

                                    colors[0]; -> "Red" 를 불러옵니다.

                                    colors[1]; -> "Green" 을 불러와 사용합니다.

                                    colors[2]; ->  "Blue" 을 불러와 이자리에서 사용할수 있게 됩니다.
         */

         // 배열 메모리 생성  - 리터럴 표기법  [ ] 사용
         let arr = [ 10, 20,  30  ];
         //          0   1    2     index

         //10을 불러와 이자리에서 출력 
         console.log(  arr[0]  ); //10 

         //20을 불러와 이자리에서 출력
         console.log(  arr[1]   ); //20

         //30을 불러와 이자리에서 출력 
         console.log(  arr[2]   ); //30

         //arr배열 메모리 전체의 칸 갯수 얻는 방법 -> 배열명.length;  
         console.log( arr.length ); // 3

         //let arr = [10,  20,  30];
         //           0     1    2   index

         //for 반복문을 활용하여  arr배열 메모리의 칸의 갯수 만큼 반복하여 10, 20, 30 을 각각 얻어 출력
         for(let i=0;  i<arr.length;  i++){
            //i= 0, 1, 2 이므로 3번 반복

                //i->0 일때   index 0 위치 칸에서 10을 꺼나와 출력
                //i->1 일때    index 1 위치 칸에서 20을 꺼내와 출력
                //i->2 일때    index 2 위치 칸에서 30을 꺼내와 출력 
                //i->3 일때   조건식 i < 3에서  3 < 3라고 물었기 떄문에 거짓 false이므로 for반복문 종료
                console.log( arr[i] );
                            //10
                            //20
                            //30
         }   
         
         /*
            배열 메모리에 저장된 원본 데이터를 변경시키는 메소드들을 파괴적 메소드들이라 부른다.

                파괴적 메소드들 종류

                    1.  배열 객체 메모리에서 제공하는 push()메소드
                        기능 :  배열 객체 메모리의 가장뒷 칸에 새로운 데이터를 동적으로 추가시켜 가장 뒷 한칸을 늘리는 기능 
                        방법 :  배열명.push(새 데이터);

                    2.  배열 객체 메모리에서 제공하는 pop()메소드
                        기능 :  배열 객체 메모리의 가장뒷 칸에 저장된 데이터만 추출(가져옴)하는 기능
                        방법 :  배열명.pop();

                    3.  배열 객체 메모리에서 제공하는 unshift()메소드
                        기능 : 배열 객체 메모리의 가장앞 칸에 새로운 데이터를 동적으로 추가시켜 한칸을 늘리는 기능
                        방법 :  배열명.unshift(새 데이터);

                    4. 배열 객체 메모리에서 제공하는 shift()메소드     
                        기능 : 배열 객체 메모리의 가장앞 칸에 저장된 데이터만 추출(가져옴)하는 기능
                        방법 : 배열명.shift();
         */
         const  arr2 = [10, 20,  30, 40];
                     // 0    1    2   3    <- index  : 각 칸의 위치번호 

         //arr2배열 메모리의 가장뒷 칸에 새로운 데이터를 동적으로 추가 시켜 한칸을 늘려 저장
         arr2.push(50); //[10, 20, 30, 40, 50];
                        // 0   1   2   3   4   <- index : 각 칸의 위치번호 
         
         console.log(arr2);  //const arr2 = [10, 20, 30, 40, 50];
                              //             0   1   2   3   4   <- index : 각 칸의 위치번호 

        //arr2배열 메모리의 가장뒷 칸에 저장된 50을 추출(잘라내기)
         let number =  arr2.pop(); //50
         console.log(number); //50 출력
                              //const arr2 = [10, 20, 30, 40];
                              //              0    1   2  3     <- index : 각 칸의 위치 번호 

        //arr2배열 객체 메모리의 가장앞 칸에 새로운 데이터 0를 동적으로 추가시켜 한칸을 늘리는 기능
         arr2.unshift(0);     //const arr2 = [0, 10, 20, 30, 40];
                              //              0   1   2   3   4   <- index : 각 칸의 위치 번호 

         console.log(arr2);   //[0, 10, 20, 30, 40];
        
         //arr2배열 메모리의 가장앞 칸에 저장된 0을 추출(잘라내기)
         let result = arr2.shift();
         console.log(result); //0

         //shift()메소드 호출후 배열 모습 어떻게 바뀌었는지 arr2배열 출력
         console.log(arr2);  //[10, 20, 30, 40]

         //-----------------------------------------------------------------------------------------------------
         /*
            배열 객체 메모리가 제공하는 forEach() 메소드 
                기능 : 배열 객체 메모리에 저장된  전체 요소의 갯수만큼 반복해서
                      배열 객체 메모리에 저장된 요소(데이터)를 하나씩 순회 하면서 
                      요소 마다 콜백함수function을 자동으로 호출되게 하여 그기능을 사용하는 메소드 

                      참고.
                      function(매개변수1, 매개변수2, 매개변수3){....}

                                매개변수1 <- 현재 처리중인 배열 요소(데이터)를 차례대로 받을 매개변수1 작성 (필수로 작성)
                                매개변수2 <- 현재 처리중인 배열 요소(데이터)가 저장된 칸의 index위치번호 받을 매개변수2 작성 
                                매개변수3 <-  forEach(function(.....)); 메소드가 호출된 배열 메모리 주소 자체를 받을 매개변수 3 작성 

                문법 : 

                     const 배열명 = [데이터1, 데이터2, 데이터3];

                            배열명.forEach(function(매개변수1, 매개변수2, 매개변수3){
                            
                                반복 실행할 코드 작성;
                            
                            },  thisValue);


                            thisValue 자리에는 콜백함수 function 내부에서 this예약어로 사용할 데이터 넣습니다. <---- 선택 

         */
         const arr3 = [10, 20, 30, 40];
         //            0   1   2   3   index
         //-------------------------------------------------------------------------------------------------------------

         //arr3배열 메모리에 저장된 모든 데이터의 갯수만큼 콜백 function이 자동으로 4번 반복되어 실행되면서 프로그램 돌아 갑니다.
         arr3.forEach(function(value, value2, value3){
                     //function콜백함수의 매개변수 value로 자동으로 전달 받는 값은
                     //arr배열 메모리의  0 index 위치 칸에 저장된 10부터 ~~~~~~~~~~ 3 index 위치 칸에 저장된 40 까지의  데이터를 
                     //function이 자동으로 반복 실행될떄마다 차례대로  10   20   30   40  반복해서  얻어 사용 
                     console.log(value, value2, value3);  
                     /*
                        첫 function이    호출되면? value매개변수로 10, value2매개변수로 index 0을,  value3매개변수로 arr3배열주소 전달 받아 사용
                        두번째 function이 호출되면? value매개변수로 20,  value2매개변수로 index 1을, value3매개변수로 arr3배열주소 전달 받아 사용 
                        세번째 function이 호출되면? value매개변수로 30,  value2매개변수로 index 2를, value3매개변수로 arr3배열주소 전달 받아 사용
                        네번째 function이 호출되면? value매개변수로 40,  value2매개변수로 index 3을, value3매개변수로 arr3배열주소 전달 받아 사용 
                     */

         });
         /*
            forEach 메소드를 활용하여  배열 복제 해서 새 배열 만들기 
         */
        const numbers = [1, 2, 3];
        //               0  1  2  index

        const copy = [];

        //numbers 배열에 저장된 요소의 갯수만큼 function(num){}을 자동으로 반복해서 호출하여
        //num 매개변수로 받은 1, 2, 3 을 각각 차례대로 반복해서 비어 있는 copy [] 배열에 추가해서 저장 시키자.
        //방법 : forEach 메소드 사용 

        //[1,2,3].forEach(function(num){
        //
        // });
        numbers.forEach(function(num){
                        //        1
                        //      const copy = [1];
                        //        2
                        //      const copy = [1, 2];
                        //        3
                        //      const copy = [1, 2, 3];
                copy.push(num);
        });

        console.log(copy); //[1, 2, 3]
                            
        //-------------------------------------------------------

        //배열명.forEach(function(매개변수1, 매개변수2){}); <--- 매개변수 2개를 작성 해 놓았을 경우 실습

        const fruits = ["apple", "banana",  "cherry"];
        //                  0        1         2     <- index 

        fruits.forEach(function(item, index){

            console.log(`${index} index위치 칸에 저장된 데이터 :  ${item}`);

        });

        //-----------------------------------------------------------

        //배열명.forEach(function(매개변수1){}, this); <- this 사용한 경우 

            //참고. this ->  { } 중괄호로 생성된 객체 메모리 주소번지를 기억하고 있는 예약어.

        const obj = {
                        //속성
                        //속성명   : 저장값
                        multiplier : 2,

                        //메소드 
                        multiply : function(array){   // array매개변수로 [1,2,3] 배열 주소 받는다.
                                           //[1, 2, 3]
                                           // 0  1  2  index

                                array.forEach(function(num){  
                                                //1 *       2        ->  2출력
                                                //2 *       2        ->  4출력
                                                //3 *       2        ->  6출력
                                    console.log(num * this.multiplier); 

                                }, this);

                        }

                    };

        //obj 객체메모리 안에 만들어져 있는 multiply 메소드 호출할 때 array매개변수로 [1, 2, 3] 배열 생성후 전달 하면서 호출!
        obj.multiply(  [1, 2, 3]  );

        </script>
    
</body>
