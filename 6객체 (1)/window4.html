<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            window 객체가 제공하는 confirm() 메소드 
            - [확인] 버튼과 [취소] 버튼이 보이며 사이트 이용자에게 한번더 물어보기 위한 창을 띄우는 기능의 메소드 
              [확인] 버튼을 사용자가 누르면? 우리 개발자에게 confirm()메소드가 삭제 한다는 의미의 true반환

            - 문법
                    window.confirm("한번더 물어보기 위한 메세지");
        */
        let result = window.confirm("정말로 이파일을 삭제하시겠어요?");

        //[확인] 버튼을 눌러 파일 삭제를 원한다면?
        if(result)
            //파일 삭제 기능 구현
            document.write("파일이 삭제됨");
        else
            document.write("파일 삭제 취소함");

        /*
            window객체에서 제공하는 alert메소드 
            - 경고 메세지창(알림창)을 띄우는 기능 
            - 문법
                    window.alert("알려주거나 경고할 메세지 작성");
                    또는
                    alert("알려주거나 경고할 메세지 작성");
        */           
        window.alert("경고한다!");        
        
        /*
            window객체에서 제공하는 prompt메소드 
            - 질문 메세지를 보여주고 사용자에게 응답메세지를 입력받을 수 있는 질의 응답창을 띄우는 기능 
            - 확인 버튼과 취소 버튼 둘중 하나를 누르게 되는데
                확인 버튼을 누르면 입력받은 데이터를 문자열로 반환 받고
                취소 버튼을 누르면 null 데이터를 반환받는다.
        */
        let result2 = window.prompt("정수를 입력해 줄수 있습니까?");

        document.write(result2);


    </script>
    

</body>
</html>
