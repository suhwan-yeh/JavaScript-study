<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        document.write("<h1>모니터 정보 출력</h1>");

        document.write("모니터의 전체 너비 : " + screen.width + "<br>");
        document.write("모니터의 전체 높이 : " + screen.height + "<br>");

        document.write("작업표시줄을 제외한 모니터화면의 너비 : " + screen.availWidth + "<br>");
        document.write("작업표시줄을 제외한 모니터화면의 높이 : " + screen.availHeight + "<br>");

        document.write("모니터의 표현할수 있는 컬러 색상 비트수 : " + screen.colorDepth + "<br>");

    </script>
    
</body>
</html>
