<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            주제 : 문자열 객체메모리의 메소드를 이용해
                   사이트 이용자로 부터 입력받은 이메일의 유효성을 검사하는 예 
        
             admin@naver.com
        
        */
       //순서1. 사용자로 부터 이메일을 입력받아 userEmail변수에 저장 
       let userEmail = prompt("당신의 이메일 주소는?","");
       // "admin@naver.com"

       //순서2. 이메일 작성시 검사할 문자열들이 저장된 배열 메모리 생성
       let arrUrl = [".co.kr", ".com",  ".net", ".or.kr",  ".go.kr"];
        //              0         1         2      3         4       <- 배열 메모리 각 칸의 위치  index

       //순서3. 입력한 이메일에 @ 문자가 포함되어 있으면 true저장시키고,
       //       입력한 이메일에 @ 문자가 포함되어 있지 않으면 false저장시킬 check 조건변수를 만들자
       let check = false;

        //순서4. 입력한 이메일 문자열과 arrUrl배열메모리에 각 칸에 저장된 단어를 하나씩 비교해서 일치하면 true저장시키고,
        //      입력한 이메일 문자열과 arrUrl배열메모리에 각 칸에 저장된 단어를 하나씩 비교해서 모두 일치하지 않으면 false저장할
        //      check2 조건변수를 만들자
        let  check2 = false;     //"입력한 이메일"-> "admin@naver.com" 하면   check2변수에 true 저장
                                 //"입력한 이메일"-> "admin@naver.dsdsd" 하면 check2변수에 false 저장 

       //순서5. if 조건문을 이용하여 입력한 이메일 전체 문자열에 '@' 문자가 포함되어 있으면?
       //      check변수에 true를 저장 합시다.

       //"admin@naver.com".indexOf('@')  >  0
       // 012345
      if(  userEmail.indexOf('@')  >  0   ){
          //userEmail.includes('@') === true

                check = true; //입력한 이메일에 '@' 문자 하나가 포함되어 있다는 의미의 값 true 저장 
       }                           

       //순서6.  for반복문을 이용하여 arrUrl배열을 순회하면서 
       //        입력한 이메일과 arrUrl배열의 각 칸에 저장된 문자열들을 차례로 비교하여
       //        1개의 단어라도 일치하면  check2변수에 true를 저장 
       for(let i=0;   i<arrUrl.length;      i++){
                    //i<5;
            
            //입력한 이메일 전체문자열에 arrUrl배열의 각칸에 저장된 각 문자열이 포함되어 있으면?
            if(          userEmail.indexOf(arrUrl[i]) >  0    ){
              // "admin@naver.com".indexOf(".co.kr")  >  0         X
              // "admin@naver.com".indexOf(".com")    >  0         O
                    check2 = true; //i변수 1일때 입력한 이메일 유효                   
              // "admin@naver.com".indexOf(".net")    >  0         X
              // "admin@naver.com".indexOf(".or.kr")  >  0         X
              // "admin@naver.com".indexOf(".go.kr")  >  0         X
            }
       }
       //이메일 작성시 검사할 문자열들이 저장된 배열 메모리 생성
      // let arrUrl = [".co.kr", ".com",  ".net", ".or.kr",  ".go.kr"];
      //                  0         1         2      3         4       <- 배열 메모리 각 칸의 위치  index


       //순서7. check변수, check2변수에 저장된 값이 모두 true이면?
       //      (입력한 이메일형식이 모두 통과 되었다면?)
       if(check && check2) {
        //check = true  <-  입력한 이메일 전체 문자열에 '@' 문자 하나가 포함되어 있다는 의미
        //check2 = true <-  arrUrl배열의 모든 칸에 저장된 문자열중에서 하나라도 입력한 이메일 문자열과 같은 경우를 의미 

            //입력한 이메일 정보 화면에 출력
            document.write(userEmail);
       }else {
            //알림창을 띄워 메세지 보여주자
            alert("이메일 형식을 잘못 입력했습니다.");
       }




    </script>
    
</body>
</html>
