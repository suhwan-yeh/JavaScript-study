<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!--   
    요소 노드의 콘텐츠 조작 속성
    		
    속성				   설명
    textContent	 	  선택한 요소노드의 하위 모든 텍스노드를 선택해 옵니다.
    innerText		  선택한 요소노드의 하위 첫번째 텍스트노드를 선택해 옵니다.
    innerHTML		  선택한 요소노드의 하위 모든 노드들(HTML+텍스트)을 선택해 옵니다. 
-->
    <p id="title">Hello,<span style="display: none;">javascript!</span></p>

    <script>
                 /*
                    id="title" 설정된 <p id="title">......</p> 전체 부모 요소노드를 선택해 하고 
                    .innerText 속성을 호출해  <p>안에 작성어 있는 모든 노드들 중에서 
                    첫 자식 텍스트 Hello, 만 최종 선택해 반환 해 줍니다.
                    
                    출력결과   Hello,
                */       
                 console.log( document.querySelector("#title").innerText );


                /*
                    id="title" 설정된 <p id="title">......</p> 전체 부모 요소노드를 선택해 하고 
                    .innerHTML 속성을 호출해  <p>안에 작성되어 있는 모든 노드들 (테스트노드,요소노드 포함)을 최종 선택해서 가져옵니다.
                    
                    출력결과   Hello,<span style="display: none;">javascript!</span>
                */
                console.log(document.querySelector("#title").innerHTML);


                /*
                    id="title" 설정된 <p id="title"> ......... </p> 전체 부모 요소노드 선택 하고
                    .textContent 속성을 호출해 
                    <p>안에 작성되어 있는 모든 텍스트노드들 (Hello,  javascript!) 만 최종 선택해서 반환합니다.
                */
                console.log(document.getElementById("title").textContent);

                


    </script>



</body>
</html>
