<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            주제 :  날짜 간격 계산하기 

            Date객체에서 제공하는 getTime()메소드는 1970년 1월1일 12:00 이후의 시간에서 
            현재 날짜 사이의 간격을  밀리(초) 단위로 반환합니다.
        */

        const date = new Date().getTime();
        console.log(date);

        //================ 두 날짜 사이의 간격을 구할 수 있다 =================

        //1. 특정 날짜 정보를 Date객체 메모리를 생성할때 생성자로 전달 해서 저장 
        const date1 = new Date('2022-12-13'); //특정 날짜정보1

        //2. 특정 날짜 정보를 Date객체 메모리를 생성할때 생성자로 전달 해서 저장
        const date2 = new Date('2022-12-25'); //특정 날짜정보2

        /*
            참고.  1. 2. 두 Date객체의 getTime()메소드를 호출해서 사용하면 
                  날짜가 밀리초 단위로 반환 하는데...
                  더 큰 숫자인 미래날짜에서 더작 숫자인 과거 날짜를 뺍니다.
                  그러면 두 날짜 사이의 간격일수를 밀리초로 구할 수 있습니다.

                  이렇게 밀리초를  24(시간) X  60(시)  X 60(분)  X  1000(밀리초)로 나누면 
                  두 날짜 사이의 간격을 일수로 환산 할수 있습니다.
        */
        //3. 두 날짜 사이의 간격을 구해 상수에 저장
        const dateDiff = date2.getTime()           -  date1.getTime();
        //               1970-1-1 ~ 2022-12-25     - 1970-1-1 ~ 2022-12-13
        //                  1671926400000          -      1670889600000
        //  1036800000 =

        //4. 초 -> 일수로 계산해서 가져와 저장
        const interVal = dateDiff / (24  * 60  * 60  * 1000);
        console.log(`두 날짜의 차이는 ${interVal}일 입니다.`); //12

        




    </script>
</body>
</html>
