<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        //웹브라우저 창(window객체)이  현재 html문서 안의 모든 HTML을 읽어들였을때...
        //function함수가 호출되어 실행되게 하는 구문 
        window.onload = function(){

                // HTML태그(요소) 를 문자열로 직접 작성해서
                //<body>안에 한번에 추가 하는 방식       현업 추천

                //1. <body>사이에 추가할 HTML태그를 문자열로 작성
                const html = '<a href="http://www.gilbut.co.kr">길벗</a>';

                //2. <body>사이에 문자열 HTML태그 추가
                document.body.innerHTML = html;
        }
   </script>
</head>
<body>

    
</body>
</html>
