<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            주제3. 입력한 이메일이 형식에 맞게 잘 입력되었는지 검사
        */

        let userEamil = prompt("이메일 입력해주세요");
        /*
            정규표현식 객체 작성
            -  이메일 형식에 맞게 올바르게 입력했는지 검사하는 정규표현식 객체 작성
            -  5 ~ 12 사이의 영문자, 숫자 또는 밑줄로 시작하고,
               @ 기호가 뒷따르며,
               2 ~10 사이의 소문자 알파벳,
               . 기호,
               2 ~3 사이의 소문자 알파벳,
               선택적으로 . 기호,
               0 ~2 사이의 소문자 알파벳으로 이루어진 "이메일주소"검사하는 정규표현식 객체 작성
        */
        let reg = /^\w{5,12}@[a-z]{2,10}[\.][a-z]{2,3}[\.]?[a-z]{0,2}$/;
        /*
             ^        : 검사할 문자열의 시작을 의미 
             \w{5,12} : 알파벳, 숫자 또는 밑줄_ 이 5 ~ 12자 사이로 입력했는지 검사하는 패턴 
             @        : '@' 기호가 반드시 포함되어 있는지 검사하는 패턴 
             [a-z]{2,10} :  소문자 알파벳이 2 ~ 10자 사이로 입력했는지 검사하는 패턴
             [\.]        : '.' 기호가 반드시 포함되어 있는지 검사하는 패턴
             [a-z]{2,3}  :  소문자 알파벳이 2 ~ 3자 사이로 입력했는지 검사하는 패턴 
             [\.]?       :  '.' 기호가 0회 또는 1회 포함될수 있음을 의미하는 검사 패턴 
             [a-z]{0,2}$ : 검사할 문자열 끝 입력은 소문자 알파벳 0 ~ 2자 사이로 입력했는지 검사 패턴 

        */

        while(true){

            if(reg.test(userEamil)){  break;  }

            //정규표현식 패턴(규칙)에 맞게 입력하지 않았다면?
            alert("이메일 입력 형식이 잘못되었습니다.");
            userEamil = prompt("이메일을 입력하세요");

        }
        //이메일 정상적으로 입력했다면 입력한 이메일 출력
        document.write(userEamil, "<br>");




    </script>


    
</body>
</html>
