<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
         사용자 정의 객체 생성 작성 방법2.  객체 리터럴 {     }; 생성 방법  <------ 자바스크립트 최신버전 작성 방법

            ----------------------------------------------------
                     let   객체참조변수명 = {
                     
                            속성명 : 값,

                            새 속성명2 : 값2, <------------------------------새로 추가 하고 싶다.
                            
                            메소드명 : function(){  기능코드;  }
                     };
            -----------------------------------------------------

         사용자 정의 객체 생성 후 "속성명 : 값" 중에서 "값"을 얻고,
                              만들어져 있는 메소드 :function{ 기능코드; } 를 호출  방법 2가지 
            -------------------------------------------------------
                     방법1    . 표기법으로 값얻어 사용 

                            객체참조변수명.속성명
                            객체참조변수명.새 속성명2 = 값2;
                            객체참조변수명.속성명 = 변경할 새값;

                            객체참조변수명.메소드명();


                   추가 할 예정 
            -------------------------------------------------------------
    -->
            <script>
                //let 객체참조변수명 = {   속성명:값,     메소드명:function(){ 기능 실행 코드;}      }

                //소나타 자동차 객체 만들기 
                let  sonata = {
                                    //   속성 ----------->  값이 저장되는 변수 메모리 같은거 
                                    //속성명 : 값
                                    color   : "빨강",
                                    model   : "소나타",
                                    type    : "가솔린",

                                    //   메소드 --------->  기능하나를 함수로 만드는거 
                                    //기능1.  주행 하는 기능
                                    go     :  function(){   
                                        console.log("소나타가 주행합니다.");   
                                    },                   
                                    //기능2.  정지 하는 기능
                                    stop   :  function(){   
                                        console.log("소나타가 정지합니다.");  
                                    }
                             };
                //---------------------------------------------------------------
                //위에서 만든 sonata 객체의 "속성명:값" 한쌍 중에  "값" 얻기 
                //작성방법
                //           객체참조변수명.속성명
                document.write( sonata.color , "<br>"); //"빨강"
                document.write( sonata.model , "<br>"); //"소나타"
                document.write( sonata.type , "<br>" ); //"가솔린"
                //위에서 만든 sonata 객체의 메소드 들을 호출해서 사용
                //작성방법
                //          객체참조변수명.메소드명();
                                sonata.go(); //"소나타가 주행합니다."
                                sonata.stop(); //"소나타가 정지합니다."





            </script>

    
</body>
</html>
