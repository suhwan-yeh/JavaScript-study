<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            주제 : 웹사이트 방문자에게 이름을 영문으로 입력받아
                   방문자가 입력한 영문 이름에 소문자가 포함되어 있으면
                   모두 대문자로 변경해서 출력

                   또한 사이트 방문자로 부터 연락처를 입력받은 후 
                   연락처 정보중 뒷번호가 노출되지 않도록 뒷 네자리는 ****로 변경하여 출력되게 하자 
        */

        //1. prompt()메소드를 호출하는 구문을 작성해서 질의 응답창을 띄워
        //   사이트 이용자로 부터 연락처 전체를 입력받아 userPhone변수에 저장
        //   예)  01012345678
        let userPhone = prompt("당신의 연락처 입력 : ");
        //  "01012345678"

        //2. 입력받은 전화번호 문자열을 중에서  전화번호 뒷자리 4자리를 제외한 앞 전화번호문자열만 자른 후 
        //   뒷 4자리는 "****" 문자열과 결합후 하나의 문자열 형태로  result변수에 저장 
        //   예) "0101234****"

          //  "01012345678"
          //   012345678910 <- index
        let result = userPhone.substring(0, userPhone.length-4).concat("****");
                     //                  0,           7
                     //                               "0101234".concat("****");
                     //                                      "0101234****";
       
        //3. result변수에 저장된  "0101234****" 하나의 문자열 브라우저에 출력 
        document.write(result, "<br>");

        document.write("------------------------<br>");

        //   사이트 이용자로 부터 영문 이름을 입력받아 userName변수에 저장 
        let userName = prompt("당신의 영문 이름 입력 바람","toM");
        //   "BaBo"

        //2. 입력받은 영문 이름에 소문자가 섞여 있으면 모두 대문자로 변경한 전체 문자열을 반환받아
        //   upperName변수에 저장
        let upperName = userName.toUpperCase();
        //              "BaBo".toUpperCase();
        //                   "BABO"

        //3. upperName변수에 저장된 영문 대문자의 이름을 출력 후 줄바꿈 하나 출력
        document.write(upperName, "<br>");
*/



    </script>
    

</body>
</html>
