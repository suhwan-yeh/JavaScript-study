        ====================================================
        자바스크립트 객체 종류 크게 2가지 
                    종류1> 사용자 정의 객체 
                    종류2> 자바스크립트 문법에서 이미 만들어 놓고 개발자에게 제공하는 객체들 
    
        종류2> 자바스크립트 문법에서 이미 만들어 놓고 개발자에게 제공하는 객체들

              1. 내장객체들
                    Date 내장객체 : 날짜와 시간 정보를 처리할 때 사용하는 객체 
                    String 내장객체 : 문자열을 조작하거나 문자열관리를 객체
                    Array  내장 배열 객체 : 배열메모리 를 생성해서 값을 관리하는 객체
                    Math   내장 객체  :  수학 연산관련 메소드들을 제공 하는 객체

              2.  브라우저 객체 모델들
                    Window 브라우저 객체 :  웹브라우저 창 하나의 전체 정보를 가지며 관리하는 객체
                    screen 브라우저 객체 :  모니터 정보를 제공받거나 모니터 정보 관리 하는 객체
                    location 브라우저 객체 : 웹브라우저 주소창 에 입력한 URL 관리 하는 객체
                    history 브라우저 객체  : 웹브라우저로 요청한 페이지로 이동하는 기능의 메소드 제공 객체
                    .....

              3.  문서 객체(DOM)들        
                    .html 에 작성된 모든 HTML 태그들을 브라우저가 해석해서 변환후 제공하는 객체들
                    예)  <h1>안녕</h1> <---- <h1>문서 객체
                         <div>박스</div> <---- <div>문서 객체
      ===================================================================================================
  
            내장 객체들 종류 중에서 
             -> Date 객체  :  날짜와 시간 정보를 관리하고 처리할때 사용되는 메소드들을 제공하는 내장 객체.

                 [1] Date 객체 메모리 생성 방법

                            let 참조변수명 =  new Date();

                                참조변수명.getFullYear(); // 현재 컴퓨터에 설정된 년도 반환 기능의 메소드 호출!
                                참조변수명.getMonth();    // 현재 컴퓨터에 설정된 월   반환 기능의 메소드 호출!
                                ...........                        
      -->
            <script>
                /*
                    1. 현재 날짜와 시간정보를 제공해 주는 Date라는 이름의 객체 메모리 생성
                       작성방법
                                let  참조변수명 = new Date();
                */
                let today = new Date();
                /*						Date 객체 메모리 주소번지 0x10
                            ________________________________________________________	
                    |0x10|= |	
                            |  아래 메소드들은  현재 Date객체 메모리영역 내부에 만들어져 있음 
                            |
                            |  getFullYear(){...}
                            |  getMonth(){...}
                            |  getDate(){...}
                            |  getDay() {...}
                            |  getHours(){...}
                            |  ......
                            |________________________________________________________  				 

                     1. 현재 몇월 달인지에 대한 정보를 제공받으려면?
                        Date 객체 메모리에 만들어져 있는 getMonth() 메소드를 호출하면
                        반환 받는 값으로  현재  월-1 한 값을 반환 받아 개발자가 사용할수 있다.       
                */
                    let  nowMonth  = today.getMonth()  +  1;   
                //  let  nowMonth  =           5       +  1;
                /*
                    2.  현재 몇일인지에 대한 정보를 제공받으려면?
                        Date 객체 메모리에 만들어져 있는 getDate() 메소드를 호출하면
                        반환 받는 값으로 현재 몇일인지에 대한 정보를 숫자 값으로 하나 반환 해 줍니다.
                */
                    let  nowDate =  today.getDate();
                 // let  nowDate =          19;
                /*
                    3. 현재 무슨 요일인지에 대한 정보를 제공받으려면?
                       Date 객체 메모리에 만들어져 있는 getDay() 메소드를 호출하면
                       현재 무슨 요일 인지 숫자 하나로 반환 해줍니다.

                       0  -> 일요일 의미 
                       1  -> 월요일 의미
                       2  -> 화요일 의미 
                       3  -> 수요일 의미
                       4  -> 목요일 의미
                       5  -> 금요일 의미
                       6  -> 토요일 의미 
                */
                 let  nowDay =  today.getDay();
                //       5   =          5;

                 document.write("현재 " + nowMonth + "월 " + nowDate + "일");
                 if(nowDay === 5){
                    document.write("  금요일");
                 }
                //"현재 6월 19일 금요일"
 /*
 
			JavaScript의 Date 객체에서 제공하는 주요 메소드들
			(날짜 및 시간을 다룰 수 있는 기능들)

			let now = new Date(); // 현재 날짜와 시간을 가져오는 Date 객체 생성

			// 1. getFullYear() - 현재 연도를 가져오는 메소드
			console.log(now.getFullYear()); // 예: 2026 (현재 연도 반환)

			// 2. getMonth() - 현재 월을 가져오는 메소드 (0부터 시작, 0 = 1월, 11 = 12월)
			console.log(now.getMonth()); // 예: 5 (6월, 실제 월보다 1 작음)

			// 3. getDate() - 현재 날짜(일)를 가져오는 메소드
			console.log(now.getDate()); // 예: 19 (현재 날짜 반환)

			// 4. getDay() - 현재 요일을 가져오는 메소드 (0 = 일요일, 6 = 토요일)
			console.log(now.getDay()); // 예: 5 (금요일 반환)

			// 5. getHours() - 현재 시간을 가져오는 메소드 (0 ~ 23)
			console.log(now.getHours()); // 예: 11

			// 6. getMinutes() - 현재 분을 가져오는 메소드 (0 ~ 59)
			console.log(now.getMinutes()); // 예: 18 (현재 분 반환)

			// 7. getSeconds() - 현재 초를 가져오는 메소드 (0 ~ 59)
			console.log(now.getSeconds()); // 예: 59 (현재 초 반환)

			// 8. getMilliseconds() - 현재 밀리초(1/1000초)를 가져오는 메소드 (0 ~ 999)
			console.log(now.getMilliseconds()); // 예: 123 (현재 밀리초 반환)

			// 9. getTime() - 1970년 1월 1일 00:00:00 (UTC) 이후의 경과 시간을 밀리초 단위로 반환
			console.log(now.getTime()); // 예: 1707308400000 (밀리초 값 반환)

			// 10. setFullYear(연도) - 연도를 변경하는 메소드
			now.setFullYear(2030); // 연도를 2030년으로 변경
			console.log(now.getFullYear()); // 2030 (변경된 연도 확인)

			// 11. setMonth(월) - 월을 변경하는 메소드 (0 = 1월, 11 = 12월)
			now.setMonth(5); // 6월로 변경 (5는 실제로 6월을 의미함)
			console.log(now.getMonth()); // 5 (6월 반환)

			// 12. setDate(일) - 날짜(일)를 변경하는 메소드
			now.setDate(15); // 15일로 변경
			console.log(now.getDate()); // 15 (변경된 날짜 확인)

			// 13. setHours(시) - 시간을 변경하는 메소드 (0 ~ 23)
			now.setHours(10); // 10시로 변경
			console.log(now.getHours()); // 10 (변경된 시간 확인)

			// 14. setMinutes(분) - 분을 변경하는 메소드 (0 ~ 59)
			now.setMinutes(45); // 45분으로 변경
			console.log(now.getMinutes()); // 45 (변경된 분 확인)

			// 15. setSeconds(초) - 초를 변경하는 메소드 (0 ~ 59)
			now.setSeconds(30); // 30초로 변경
			console.log(now.getSeconds()); // 30 (변경된 초 확인)

			// 16. setMilliseconds(밀리초) - 밀리초를 변경하는 메소드 (0 ~ 999)
			now.setMilliseconds(500); // 500밀리초로 변경
			console.log(now.getMilliseconds()); // 500 (변경된 밀리초 확인)

			// 17. toDateString() - 날짜를 사람이 읽기 쉬운 형식의 문자열로 변환
			console.log(now.toDateString()); // 예: Thu Jun 15 2030 (요일, 월, 일, 연도 반환)

			// 18. toTimeString() - 시간을 사람이 읽기 쉬운 형식의 문자열로 변환
			console.log(now.toTimeString()); // 예: 10:45:30 GMT+0900 (KST) (시간 반환)

			// 19. toISOString() - 날짜를 국제 표준(ISO 8601) 형식의 문자열로 변환
			console.log(now.toISOString()); // 예: 2030-06-15T01:45:30.500Z (UTC 표준 시간 반환)

			// 20. toLocaleString() - 현재 지역(국가) 설정에 맞춘 날짜와 시간 문자열 반환
			console.log(now.toLocaleString()); // 예: 2030. 6. 15. 오전 10:45:30 (로컬 형식 반환)

			// 21. toLocaleDateString() - 현재 지역 설정에 맞춘 날짜 문자열 반환 (연도, 월, 일)
			console.log(now.toLocaleDateString()); // 예: 2030. 6. 15. (로컬 날짜 형식 반환)

			// 22. toLocaleTimeString() - 현재 지역 설정에 맞춘 시간 문자열 반환 (시, 분, 초)
			console.log(now.toLocaleTimeString()); // 예: 오전 10:45:30 (로컬 시간 형식 반환)

 */
            </script>
