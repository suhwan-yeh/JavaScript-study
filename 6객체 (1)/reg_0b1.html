<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<script>
/*
      # 정규 표현 객체
      -  정규표현(RegExp) 객체는 입력 요소에 데이터를 패턴(규칙)에 맞게 작성 했는지 판단해서 알려주는  객체 이다.
      
      -   내가 지정한 패턴(규칙)대로 단어가 입력 되었는지, 잘못된 단어를 포함하고 있는지 찾을때 사용함.
      
      -  정규 표현 객체를 생성하는 기본문법 2가지

         1. let  참조변수 = new RegExp( 패턴(규칙)  , 검색옵션);

         2. let  참조변수 = /패턴(규칙)/검색옵션;
         
         검색옵션을 사용하면 일치하는 단어를 찾을때, 다양한 조건과 패턴(규칙)을 붙여 검색할 수 있습니다.
         가령, 영문 문자 중 찾고자 하는 단어를 검색할 때, 대문자 소문자를 가리지 않을 것인지, 
         또는 찾고자 하는 문자가 문장 맨 앞에서 부터 일치 하는지 등의 다양한 검색 옵션을 지정할 수 있다.
         
      - 정규 표현 검색 옵션
     	종류										설명
         *											0회 이상 일치하는 문자를 검사할때 사용함.
         +											1회 이상 일치하는 문자를 검사할때 사용함.
         i											찾는 문자가 영문일 경우  대-소문자를 구분 하지 않습니다.
         ?											0회 또는 1회, 규칙에 맞는 문자가 있는지 검사 합니다.
         g											옵션에 g가 없으면 데이터의 왼쪽부터 규칙에 일치하는 문자 한 개만 찾지만,
                                         		    g를 넣으면 규칙에 맞는 모든 문자를 찾습니다.

         m											데이터의 행이 바뀌어도 규칙에 맞는 문자를 찾습니다.
         $											문자열 끝부분에 규칙에 맞는 문자를 찾습니다
         ^											문자열 앞에서부터 규칙에 일치하는 문제를 찾습니다. 또는 부정을 나타냅니다.
         
         \d											숫자 하나를 찾습니다.
         \D											숫자가 아닌 문자 하나를 찾습니다.
         \s											공백 문자(스페이스)를 찾습니다.
         [0~9][A~Z][a~z]							숫자, 대문자 영문, 소문자 영문을 찾습니다.
         \w											알파벳, 숫자, 밑줄(_) 기호를 찾습니다.
         \W											알파벳,숫자, 밑줄(_) 기호를 제외한 문자를 찾습니다.
         a|b										a또는 b인지 검사할때 사용.											
                                          
          
      - 정규 표현식 자주 쓰는 검색 옵션
		
		i: 대소문자 구분 없이 검색 (예: "hello"와 "HELLO"를 동일하게 취급).
		
		g: 패턴에 맞는 모든 결과를 찾음 (한 번만 찾는 게 아니라 여러 번 찾음).
		
		m: 여러 줄에 걸쳐서 검색.
		
		*: 앞에 있는 문자가 0번 이상 반복되는 경우.
		
		+: 앞에 있는 문자가 1번 이상 반복되는 경우.
		
		?: 앞에 있는 문자가 0번 또는 1번 있는 경우.
		
		
	  - 자주 쓰는 정규 표현식 패턴(규칙)
		
		\d: 숫자 찾기 (예: 123 → 1, 2, 3).
		
		\w: 문자, 숫자, 밑줄(_) 찾기.
		
		\s: 공백 문자 찾기 (스페이스, 탭 등).
		
		[A-Z]: 대문자 알파벳만 찾기.
		
		a|b: a 또는 b 찾기.

       
                                    
      - 정규 표현객체의  메서드 	
         ~메서드를 사용하면  지정한 특정 문자 데이터가 정규 표현 패턴(규칙)에 맞게 작성되었는지 알수 있음.
         
         종류												설명
         
         test()										규칙에 맞는 텍스트가 있는지 확인.
         											있으면 true, 없으면 false를 반환.
         											예: /hello/.test("hello world") → true.
         											
         exec()										규칙에 맞는 텍스트를 찾아서 반환.
         											예: /hello/.exec("hello world") → "hello".

*/
	//주제 :  문자열 검사

      //순서1.  검사할 문자열을 만들어 변수에 저장
      let str = "Html Css Jquery";

      //순서2.  검사할 문자열에 "css" 단어가 포함되어 있는지 검사하는 정규표현객체 생성후 변수에 저장
      //정규표현객체 생성방법2
      //let 변수 =  /패턴/검색옵션;
      let   reg1 = /css/i;
      /*
               /     /  정규표현객의 시작과 끝을 나타내닌 구분자 기호 입니다.

                css    검사할 문자열에서 찾고자 하는 문자열 패턴(규칙)
                       이 경우 'css' 라는 문자열이 검사할 전체문자열에 포함되어 있는지 검사하는 패턴 
                 
                 i     검색옵션자리에  i옵션기호를 작성하면 검사할 전체문자열 검사할때 
                       대소문자 구분하지 않고 'css' 문자열이 전체 문자열에 포함되어 있는지 검사하는 검색옵션 문자i    
      */
     //순서3. 정규표현객체  /css/i 이용하여 검사할 전체문자열에 css 문자열이 포함되어 있는지 검사하기위해
     //       정규표현객체에서 제공하는 test()메소드를 호출해 검사 
     //test메소드 작성 방법
     //                    정규표현객체.test("검사할 전체문자열");
     //test메소드 호출 해석
     //                    정규표현객체 패턴에 맞게 검사할 전체문자열을 입력했다면 test메소드는 true반환하고,
     //                    정규표현객체 패턴에 맞게 검사할 전체문자열을 입력하지 않았다면 test메소드는 false를 반환합니다.

    //            '/css/i'.test("Html Css Jquery");
   let result_1     = reg1.test(str);

   // 검사 결과를 웹페이지에 출력
   document.write(result_1); //true
	
	
	</script>


</body>
</html>
