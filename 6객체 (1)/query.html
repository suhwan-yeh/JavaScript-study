<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!--
    document객체에 만들어져 있는 css선택자 문법으로 요소노드를 선택해 오는 메소드들
    
        querySelector(css선택자 문법 ) 메소드
        -	 매개변수로 전달한  css선택자 문법으로 선택한  요소노드 1개만 선택해서 반환하는 메소드
        
        querySelectAll(css선택자 문법 ) 메소드
        -    매개변수로 전달한 css선택자 문법으로 선택한 모든 요소노드를 배열에 담아 한번에 선택해서 반환하는 메소드
-->

    <div class="box-1">
        <p class="text">text-1</p>
        <p class="text">text-2</p>
    </div>
    <div class="box-2">
        <p class="text">text-3</p>
        <p class="text">text-4</p>
    </div>
    <script>
        /*
            1. document.getElementsByClassName("box-1") 메소드를 호출하면?
               class="box-1" 작성된
                <div class="box-1">
                    <p class="text">text-1</p>
                    <p class="text">text-2</p>
                </div>
                배열의 0 index 위치칸에 담아 선택해 옵니다.

            2.  document.getElementsByClassName("box-1")[0] 작성 하면?
                배열의 0 index 위치칸에 저장된 
                <div class="box-1">
                    <p class="text">text-1</p>
                    <p class="text">text-2</p>
                </div>
                요소노드 한쌍을 꺼내옵니다.

            3.  document.getElementsByClassName("box-1")[0].children;  까지 작성 하면?
                children속성을 호출하여  <div>사이에 작성된 모든 자식 p요소노드들을  배열에 담아서 최종 배열을 반환받습니다.
                모습
                    [ <p class="text">text-1</p>,    <p class="text">text-2</p> ]
                                    0           ,             1                  index
        */

        const el2 = document.getElementsByClassName("box-1")[0].children;
        console.log(el2[0]);  // <p class="text">text-1</p>
        console.log(el2[1]);  // <p class="text">text-2</p>
        /*
             getElementsByClassName메소드  +  children속성 을 이용해

             <p class="text">text-1</p>
             <p class="text">text-2</p>

             최종 선택해와 const el2상수에 저장 
        */





        /*
         1. document.querySelectorAll(".box-1");

            querySelectorAll 메소드 호출시 class속성에 부여된 값이 box-1인 

            <div class="box-1">
                <p class="text">text-1</p>
                <p class="text">text-2</p>
            </div>

            부모 요소노드를 먼저 선택해 오되,

         2. document.querySelectorAll(".box-1 .text");
         
            " " 빈공백 하위선택자를 이용해  하위 모든 자식요소노드들을 선택해 오는데
           그중에서도 class속성에 부여된 값이 text인 

            <p class="text">text-1</p>
            <p class="text">text-2</p>

            자식 요소노드 두쌍을 모두 NodeList객체 배열에 담아 최종! NodeList객체 배열 자체를 반환해 줍니다.
        */
        const el3 = document.querySelectorAll(".box-1 .text");
        console.log(el3[0]);
        console.log(el3[1]);


		/*
            querySelector메소드 호출시 class속성값이 box-1인 <div>요소노드 한쌍을 선택해서 반환

            <div class="box-1">
                <p class="text">text-1</p>
                <p class="text">text-2</p>
            </div> 	
		*/
           const el  = document.querySelector(".box-1");
           console.log(el);  


    </script>

    
</body>
</html>
