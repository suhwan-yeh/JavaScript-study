<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            window객체에서 제공하는 moveTo메소드 
            - 현재 웹브라우저 창을 모니터 화면의 특정 위치로 이동시키는 기능의 메소드 
            - 문법
                    window.moveTo(x,y);

                    x -> 화면의 왼쪽 모서리부터 픽셀단위로 오른쪽 이동할 수평좌표값 지정
                    y -> 화면의 왼쪽 모서리부터 픽셀단위로 아래쪽으로 이동할 수직좌푯값 지정 
        */
        //현재 웹브라우저 창을 화면의 좌측 상단에서 100px 만큼 이동해서 위치하게 하고
        //                                    100px 만큼 아래로 이동되어 위치하게 하자
        window.moveTo(100, 100);
                //     x,  y  축의 위치 값 


    </script>

    
</body>
</html>
