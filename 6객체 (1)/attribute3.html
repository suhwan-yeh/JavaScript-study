<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
        메소드로 속성 조작
        ───────────────────────────────────────────────────────────────────────────────────────
        메소드                                    설명
        ───────────────────────────────────────────────────────────────────────────────────────
        노드.getAttribute("속성명");               해당 속성의 값을 반환
        노드.setAttribute("속성명", 값);           해당 속성 값 변경/추가
        노드.removeAttribute("속성명");            해당 속성 삭제
    -->
    <a href="#" class="fz20"  >link</a>

    <script>
            //1. 위 a요소노드 선택해서  class="fz20" 한쌍 삭제
            //힌트)  removeAttribute 메소드 사용 
            const aEl = document.querySelector("a");
//          aEl.removeAttribute("class");
            //결과 ->  <a href="#">link</a>

            //2. 1.에서 선택한 a요소노드 class="fz20" 한쌍 중에서 "fz20" 값만 삭제하여  class 남김 
            //힌트)  classList.remove 메소드 사용
//          aEl.classList.remove("fz20");
            //결과 ->  <a href="#" class>link</a>

    /*
    ───────────────────────────────────────────────────────────────────────────────────────
	참고.
	classList속성과 setAttribute메소드
	- classList속성으로  class속성값을 추가하거나 삭제하면
	  기존 요소가 가지고 있던 class속성값을 보존하면서 추가하거나 삭제한다는 특징이 있습니다.
	  
	classList속성과 removeAttribute메소드
	- classList속성으로 class속성값을 삭제하면
	  기존 요소가 가지고 있던 class속성값을 보존하지  않으면서 삭제한다는 특징  이 있습니다 
	───────────────────────────────────────────────────────────────────────────────────────		
    */

    // ================= <a href="#" class="fz20">link</a> 현재 이줄에서 모습 ================
 
        //1.  a요소노드의 기존 class속성값 "fz20"을 보존하면서 class="red-color" 추가 
        //   그림 ->   <a href="#"  class="fz20  red-color">link</a>
 //     aEl.classList.add("red-color");


        //2.  a요소노드의 기존 class속성값 "fz20"을 보존하지 않고 class속성값을 red-color로 변경
        //   그림 ->  <a href="#" class="red-color">link</a>
        aEl.setAttribute("class", "red-color");




    </script>

    
</body>
</html>
