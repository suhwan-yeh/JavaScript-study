<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
                0.0 ~ 1.0(제외)  랜덤 실수값 하나 발생시키려면?

                    Math.random();  ->  0.2
                                    ->  0.99
                                    ->  0.99999

                원하는 구간  3 ~ 7 사이의 랜덤수를 정수형태로 하나 발생시키려면?

                        원하는 구간에서 난수(랜덤값)을 정수하나로 발생하는 식

                             Math.floor( Math.random()  *  (최댓값 - 최솟값 + 1) ) + 최솟값

                             Math.floor( Math.random()  *  (7     - 3     + 1) ) + 3
                                              0.8       *  (           5     )
                                                       4.0
                             Math.floor(               4.0                     ) + 3
                                                        4                        + 3
                                                                            7
                            ========================================================
                                3부터 ~~~~~~ 7까지 정수가 총 몇개인지 계산 을 위해 

                                계산식 
                                       최댓값 - 최솟값 + 1
                                         7   -   3   + 1
                                             4       + 1
                                                    5

                                 따라서 3부터 7까지의 정수 개수는 5개입니다.
                                 3, 4, 5, 6, 7
                            =========================================================
                                 마지막으로 최솟값 3을 왜 더하는가???????

                                지금까지 만들어진 정수는 다음 중 하나입니다.

                                        0, 1, 2, 3, 4

                                따라서 만들어진 숫자에
                                최솟값인 3을 더합니다.       

                                각각 3을 더해 보면:
                                        0 + 3 = 3
                                        1 + 3 = 4
                                        2 + 3 = 5
                                        3 + 3 = 6
                                        4 + 3 = 7

                                결과적으로:

                                 0, 1, 2, 3, 4                    

                                위 범위가 다음 범위로 이동합니다.

                                 3, 4, 5, 6, 7

                                이처럼 마지막에 최솟값을 더하는 이유는
                                0부터 시작하던 난수 범위를
                                원하는 최솟값부터 시작하도록 이동시키기 위해서입니다.
             
        */
        //120 ~ 150 사이의 난수 하나를 정수로 발생!
        let min = 120; //최솟값
        let max = 150; //최댓값

	   //	                Math.floor( Math.random()  * (최댓값-최솟값+1) ) + 최솟값;
        let randomNumber =  Math.floor( Math.random()  * (max  - min +1) ) +   min;
        //                  Math.floor(      0.8       * (150  - 120 +1) ) +   120;
        //                  Math.floor(      0.8       * (           31) ) +   120;
        //                  Math.floor(               24.8               ) +   120;
        //                                             24                  +   120;
        //                                                               144
        document.write(randomNumber);


    </script>

    
</body>
</html>
