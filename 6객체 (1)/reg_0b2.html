<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            주제1. 사이트 이용자에게 입력받은 이름이 2 ~ 5 사이의 한글로만 입력했는지 검사.
        */
        //순서1. 입력받은 이름을 변수에 저장
        //입력받은 이름? 검사할 문자열 대상이 됩니다.
        let userName = prompt("이름을 입력해 주세요");


        //순서2. 정규표현식 객체 작성
        //-> 입력받은 이름이 2 ~ 5 사이의 한글로만 입력했는지 검사하는 정규표현식 객체 작성
        let reg1 = /^[가-힣]{2,5}$/;
        /*
            ^        : 검사할 문자열 대상에서 시작을 나타내는 기호 
            [가-힣]   : 한글 음절의 범위를 지정합니다. 즉! 한글로 입력했는지 판단하는 규칙(패턴)
            {2,5}    : 앞의 패턴 [가-힣]이 2자에서 5자 사이로 입력했는지 판단하는 규칙(패턴)
            $        : 문자열의 끝을 나타내는 기호
        */

        //순서3. 정규표현식 객체의 test메소드를 이용하여 입력받은 전체문자열이 정규표현식 객체의 패턴에 맞게 입력했는지 검사
        while(true){

            if(reg1.test(userName)){ //입력한 이름이 "2 ~ 5 사이의 한글로만 이루어진 문자열" 과 같으냐?
                break;
            }

            alert("이름을 2 ~ 5 자사이의 한글로만 입력바람");

            userName = prompt("이름을 입력해 주세요");
        }




    </script>


    
</body>
</html>
