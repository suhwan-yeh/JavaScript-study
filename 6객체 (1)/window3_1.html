    <script>
        //주제. window객체에서 제공하는 setInterval메소드를 이용하여
        //      1초 간격으로 현재 날짜 정보와 시간정보를 사이트 화면에 반복해서 보여주자
    //방법1.

        // 현재 년 월 일 시 분 초 정보를 제공하는 기능의 함수 
        function time(){

            //현재 날짜와 시간정보를 제공하는 Date객체 생성
            let date = new Date();

            //현재 날짜와 시간정보를 문자열 하나로 만들어 변수에 저장
            let currentTime = date.getFullYear() + "년 "
                            + (date.getMonth() + 1) + "월 "
                            + date.getDate() + "일 "
                            + date.getHours() + "시 "
                            + date.getMinutes() + "분 "
                            + date.getSeconds() + "초"; 
                            
            console.log(currentTime);
        }

        //1초 마다 time() 함수 호출해서 실행
        window.setInterval(time, 1000);
