<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!--
	document 객체에 만들어져 있는 메소드

	1. getElementById("요소 노드의 id 속성에 부여한 값");
	   -> 요소 노드에 부여한 id 속성값을 매개변수로 전달하면
	      전달한 id 속성값과 일치하는 요소 노드를 1개만 선택해 반환해 줍니다.

	2. getElementsByClassName("요소 노드의 class 속성에 부여한 값");
	   -> 요소 노드에 부여한 class 속성값을 매개변수로 전달하면
	      전달한 class 속성값과 일치하는 모든 요소들을 배열 형태로 담아
	      배열을 선택해서 반환해 줍니다.

	3. getElementsByTagName("요소 노드명");
	   -> 작성해 놓은 HTML 요소 노드명을 매개변수로 전달하면
	      전달한 요소 노드명과 일치하는 모든 요소 노드들을 배열 형태로 담아
	      배열을 선택해서 반환해 줍니다.
-->

    <h1 id="title">title</h1>
    <p  class="text">text-1</p>
    <p  class="text">text-2</p>
    <script>
        /*
            getElementById("title")
            - id="title" 중에서 "title"값과 일치하는 요소노드 하나만 선택해서 반환합니다.
              여기서는  <h1 id="title">title</h1> 요소노드 하나만 반환합니다.
        */
        const el = document.getElementById("title");
        console.log(el);  // 출력   <h1 id="title">title</h1>

        /*
            getElementsByClassName("text")
            -  class="text" 중에서 "text" 이름과 일치하는 모든요소노드들 p를 배열에 담아 선택해옴
            - [ <p  class="text">text-1</p>,  <p  class="text">text-2</p> ]  <- 배열
                              0            ,                1               index
        */
         const classEl = document.getElementsByClassName("text");
         console.log(classEl[0]);  // 출력  <p  class="text">text-1</p>
         console.log(classEl[1]);  // 출력  <p  class="text">text-2</p>


        /*
            getElementsByTagName("p")
            메소드를 호출 할때 요소노드명 "p", 즉 태그명 "p"를 매개변수로 전달하면
            p와 일치하는 모든 <p>요소노드들을 배열에 담아 배열을 반환합니다.
            [ <p  class="text">text-1</p> ,  <p  class="text">text-2</p> ] <- 배열
                            0             ,               1               index
        */
        const tagEls = document.getElementsByTagName("p");
        console.log(tagEls[0]);  // 출력   <p  class="text">text-1</p>
        console.log(tagEls[1]);  // 출력   <p  class="text">text-2</p> 

    </script>


</body>
</html>
