      // 아래 document.write("안녕하세요<br>"); 한줄을 열번반복해서 실행
        for (let i = 1;  i  < 11;  i++) {  

             //10번 반복해서 출력할 구문 한줄 작성
             document.write("안녕하세요<br>");
