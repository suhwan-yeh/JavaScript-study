<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
        주제 : while 반복문을 사용하여 팩토리얼을 계산하는 웹애플리케이션

            팩토리얼이란?
                1부터 주어진 어떤 정수 숫자까지 곱한 결과.
                예를 들어  3 팩토리얼값은?   1  *   2   *  3 의 계산결괏값 6을 의미하며 
                          3 팩토리얼 이라고 읽고  3! 라고 작성합니다.   
    -->
        <h1>while 반복문을 사용한 팩토리얼 계산</h1>

        <script>
                /*
                    사이트 이용자에게 입력받은 정수 숫자까지의 팩토리얼 값을 구하기 위해
                    입력받은 정수 숫자값을 n변수에 저장
                */
               let  n = prompt("정수 숫자를 입력하세요","10");

               /*
                    사이트 이용자가 입력을 했거나 하지 않았을 경우 각각 다른 메세지를 저장할 변수 선언 
               */
               let msg = "";

               /*
                    prompt 함수를 이용해 입력 후 확인 버튼을 눌렀다면? (취소 버튼을 누르지 않았는지 체크크)
               */
               if( n  != null ){

                    //입력한 값의 팩토리얼 계산 결괏값을 저장할 변수를 선언하고 1로 초기화
                    let nFact = 1;

                    //--------------------------------------------------------

                    //카운터 변수(조건변수) i를 선언하고 1로 초기화
                    let i = 1;

                    //i 조건변수에 저장된 값이 입력받은 숫자(n변수에 저장된 값)보다 작거나 같을때 까지 반복하는데..
                    //조건-> 만약 3을 입력 받았다면  i변수값이 1에서 입력받은 숫자 3보다 작거나 같을때까지 반복합니다.
                    while (i  <= n){
                    //     1  <= 3   -> true 
                    //     2  <= 3   -> true
                    //     3  <= 3   -> true
                    //     4  <= 3   -> false 일때  while반복문의 {} 중괄호 빠져나감 
                       
                    //     1  *= 1;    // naFact = 1
                    //     1  *= 2;    // naFact = 2
                    //     2  *= 3;    // naFact = 6    
                        nFact *= i; 

                        i++; //1 -> 2 -> 3 -> 4
                    }//--------------------------------> while 반복문  } 닫는 기호 

                    //nFact = 6

                    msg = n + "! = " + nFact;         

               }else { //prompt 함수를 이용해 입력후 [취소] 버튼을 눌렀다면? 
                       //([확인] 버튼을 누르지 않았는지 체크 ,  입력한 숫자가 없다면? )

                    msg = "숫자 값을 입력하지 않았거나 [취소]버튼을 눌러서 숫자를 얻지 못했다";
               }

               document.write(msg);   //숫자 입력했으면?    "3! = 6"
                                      //숫자 입력안했으면?  "숫자 값을 입력하지 않았거나 [취소]버튼을 눌러서 숫자를 얻지 못했다"




        </script>

    
</body>
</html>
