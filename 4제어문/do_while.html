<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            주제 : 사이트 이용자(클라이언트)가  입력한 숫자가 10이상일 될때까지 
                  계속 반복해서 입력을 받는 프로그램 
        */
        let number;  //사이트 이용자로 부터 입력받은 숫자가 저장될 변수 선언

        let  i = 0;     //i변수는 사이트 이용자가 입력한 횟수가 저장될 변수 선언

        //do while 반복문 

        do {

             //-------------- 무조건! 한번 실행시키고  조건식의 결과가 참일때만만  반복실행 될 실행문; ----------
             
             //사이트 이용자로 부터 숫자를 입력받아 입력받은 숫자형태의 문자열을 정수 숫자로 변경해서 number변수에 저장
             number =  parseInt( prompt("숫자 정수를 입력하세요(10이상):") );
         //            parseInt(              "10"                     );  -> 10

             //if조건문을 이용하여 사이트 이용자가 입력한 숫자가 ~~ 10보다 작은 경우  메세지 출력
             if(number <  10){

                document.write(  ++i + "번째 입력한 숫자가 10보다 작습니다. 다시 입력바람<br>" );
             }


        }while(number < 10); //사이트 이용자가 입력한 숫자가 10보다 작을때까지만 위 do{  } 내부에 작성한 메세지 출력!


        //do While 반복문을 벗어나  이 줄의 코드 부터는 입력받은 숫자가 10 이상임을 알리고 프로그램 종료
        //메세지 출력
        document.write( ++i + "번째 입력한 숫자는 " + number + "입니다. 프로그램을 종료합니다.");


    </script>


    
</body>
</html>
