<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            for 반복문 작성

                i변수의 초깃값을 1로 저장하여 초기식; 을 작성하고
                i변수의 값을 1씩 증가시키는 증감식 작성합니다.
                i변수의 값이 10보다 작거나 같을때 까지의 조건식;을 작성해서 반복시킵니다.
                i변수에 저장된 숫자 1부터 10사이의 숫자 중에서  1  2  3  4  5 만 반복해서 출력합니다.
        */
        for (let i=1;  i<=10;   i++){

            //아래의 document.write(i, "<br>"); 코드에 의해 1  2  3  4  5 까지만 출력되게 하고
            // i변수값이 6과 같으면? for(...){} 중괄호 빠져나가 for문 종료시키자 -> break;
            if(i  === 6){
                break;   //<------- 강제로  for{} 중괄호의 }를  빠져나감 
            }

            document.write(i, "<br>");
        }

        document.write("-------------------------------------<br>");

        //위 작성한 for반복문 코드 전체를  while반복문 코드로 모두 변경해서 같은 숫자가 출력되게 해보기 

        let i=1; //1. 변수에 조건을 판단하는 조건 초깃값 저장

        while(i<=10){    //2. 그다음 while문을 작성해 사용

             //아래의 document.write(i, "<br>"); 코드에 의해 1  2  3  4  5 까지만 출력되게 하고
            // i변수값이 6과 같으면? for(...){} 중괄호 빠져나가 for문 종료시키자 -> break;
            if(i  === 6){
                break;   //<------- 강제로  for{} 중괄호의 }를  빠져나감 
            }

            document.write(i, "<br>");

            i++;
        }




    </script>
</body>
</html>
