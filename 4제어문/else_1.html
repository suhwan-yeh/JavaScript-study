<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <script>
  /*
    주제 : 사이트 방문자에게 좋아하는 숫자를 하나 입력받아
           입력받은 숫자 짝수 인지 홀수 인지 if  else  조건문들 사용하여 판단하여
           짝수일 경우 "당신이 좋아하는 숫자는 짝수입니다."
           웹브라우저 화면에 응답(출력)
           홀수일 경우 "당신이 좋아하는 숫자는 홀수입니다."
           웹브라우저 화면에 응답(출력)
  */       
        //순서1. 질의 응답창을 브라우저 화면에 띄워 "당신이 좋아하는 숫자를 입력하세요" 라고 물어보세요
        //      그리고 입력받은 숫자를 let num 변수 메모리에 저장
        let num = prompt("당신이 좋아하는 숫자를 입력하세요");

        //순서2. if  else 구문을 작성해서 
        //      만약에~ 입력받은 num변수의 값이 짝수이냐?라고 물었을때 짝수이면?
        //       "당신이 좋아하는 숫자는 짝수 입니다." <- 브라우저 화면에 출력
        if(num % 2 === 0){

            document.write("당신이 좋아하는 숫자는 짝수 입니다.");
        }
        //      입력받은 num변수의 값이 짝수가 아니면?(홀수이면?)
        //      "당신이 좋아하는 숫자는 홀수 입니다." <- 브라우저 화면에 출력
        else{

            document.write("당신이 좋아하는 숫자는 홀수 입니다.");
        }




     </script>

    
</body>
</html>
