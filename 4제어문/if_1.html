<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            예제 : 사이트 방문자에게 입력받은 걸음수를 조건문if로 만들고
                  입력받은 하루 걸음수가 10,000 보 이상일 경우만  실행문 출력시키자.

            if 조건문
                        if(조건식){
                        
                            조건식이 참일때 실행할 실행문코드;
                        }

                        해석 : if 만약에~ 조건식의 결과가 참일 경우
                              중괄호 내부에 작성된 실행문코드 실행 시킨다.

        */
        //순서1. 웹사이트 방문자에게 하루 걷는 걸음수를 입력받아 walkAmount변수메모리에 저장
        let walkAmount = prompt("당신의 하루 걷는 양이 몇보인지 입력해!","0");
        //  10000
        //               만약 웹사이트 방문자가 10000을 입력하고 [확인] 버튼을 누른경우는  prompt함수가 10000을 되돌려줘서
        //               let walkAmount 변수에 = 대입해서 저장하게 됩니다.

        //순서2. 하루 걷는 걸음수가  10000 보 이상이냐? 묻는 조건식을 if조건문으로 작성
        //if -> 만약에~
        //if(walkAmount >= 1000) ->  만약에~ walkAmount변수에 저장된 값이 10000보다 크거나 같으냐?라고 묻는 조건식
        //                       ->  만약에~ 입력받은 걸음수가 10000 이상이냐? 라고 묻는 조건식 
        if( walkAmount >= 10000 ){ //<- 10000이상을 입력 받았을때만 아래의 실행문코드가 실행되어 출력할 영역  {   }
                        
             //조건식이 참일때 실행할 실행문코드;
             document.write("매우 좋은 습관을 지니고 계시는 군요!!");
        }       

        //결론:
        //화면에 입력한 값이 10,000 보 이상일 경우에는  조건식의 결과가 true를 반환하여 실행문코드를 실행해서 보여주지만,
        //화면에 입력한 값이 10,000 보 미만일 경우에는  조건식의 결과가 false를 반환하여 실행문코드를 실행하지 않아 보여주지않는다.



    </script>

    
</body>
</html>
