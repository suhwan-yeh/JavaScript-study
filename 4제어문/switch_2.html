<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
		   문제 : 사이트 방문자에게 현재 몇월 달인지 입력받습니다
		          입력받은 월에 따라 각각 다른 문장을 출력하는 예
		 */
         //순서1. 사이트 방문자에게 현재 몇월 달인지 입력받아 mon변수에 저장
         let mon = prompt("현재 몇월인지 입력하세요!");
         //   10

         //순서2.  입력받은 현재 몇월 달인지의 숫자 값에 따라 각각 다른 문장을 출력시킵니다.
         //        switch 전체구문을 사용해서 작성합니다.

        let message; // 계절 메세지를 저장할 변수 선언 

         switch (true) {

            case (mon >= 9  &&  mon <= 11 ) : 
                message = "독서의 계절 가을 이네요!!";  
                break;

            case (mon >= 6  &&  mon <= 8) :
                message = "여행 가기 좋은 여름 이네요!!";
                break;    

            case (mon >= 3 &&  mon <= 5 ):
                message = "햇살 가득한 봄이네요!!";
                break;    
         
            default:
                message = "스키의 계절 겨울이네요!!";
                break;
         }

         //message변수에 저장된 계절 메세지 한번만 출력
         document.write(message);



    </script>

    
</body>
</html>
