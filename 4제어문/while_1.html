<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        //조건식을 검사할 조건변수 선언 후 초기값을 저장 
        let i = 1;
        /*
        i = 1 일때  1 <= 10 조건식 검사한 결괏값은 true
        안녕하세요1 
        i++ 증가 연산자를 통해  i변수값 2로 만들어줌 

        i = 2 일때  2 <= 10 조건식 검사한 결괏값은 true
        안녕하세요2
        i++ 증가연산자를 통해  i변수값 3으로 만들어줌

        i = 3 일때   3 <= 10 조건식 검사한 결괏값 true
        안녕하세요3
        i++ 증가연산자를 통해 i변수값 4로 만들어줌 

        i = 4 일때   4 <= 10 조건식 검사한 결괏값 true
        안녕하세요4
        i++ 증가연산자를 통해 i변수값 5로 만들어줌 

        i = 5 일때   5  <= 10  조건식 검사한 결괏값 true
        안녕하세요5
        i++ 증가연산자를 통해 i변수값 5에서 6으로 만들어 저장한다.
        ....
        ....
        ....

        i = 11 일때  11 <= 10 조건식의 결괏값  false이므로 while반복문의 {  } 닫는기호 완전히 빠져나가 그다음 코드실행
        */
        //i변수에 저장된 값이 10보다 작거나 같을 동안만 ~~~ 계속 반복해서 실행문 실행!
        while(i <= 10){

            //위 조건식 i <= 10 의 결과가 true일때만 반복해서 실행될 실행문 과 증감식;
            
            //실행문 : 조건식의 결과가 참(true)일때만 반복실행될 문장(실행문)
            document.write("안녕하세요" + i , "<br>");

            //증감식 : i변수에 저장된 값을 1씩 반복해서 증가해서 저장 
            i++;

        }
/*
		 while문의 조건식 i<=10을 검사한 후 만족(true)하면 
		 중괄호 {...}에 있는 실행문을 실행하고,
		 증가 연산자로 변수i의 값이 1증가 됩니다.
		 다시 조건식 만족 여부를 검사한후, 만족(true)하면 다시 중괄호에 실행문을 실행하고,
		 거짓(false)이면 while문을 종료 합니다.

         
         let 변수 = 초깃값; //1. 변수에 조건을 판단하는 조건 초깃값 저장

         while(조건식){    //2. 그다음 while문을 작성해 사용

                        실행문;

                        증감식;
         }
    */


    </script>


    
</body>
</html>
