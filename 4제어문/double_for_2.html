<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- css 작성할 선언문 태그 영역 -->
    <style>
        /* 바깥쪽 for에서 9번 반복되면서 출력되는 모든 div를 한번에 선택해서 가져와 스타일 정의 */
        div {
            /*인라인 블록으로 설정하여 가로로 나열되도록 합시다*/
            display: inline-block;

            border: 1px solid gray; /* 바깥 경계선을 설정함*/

            /*패딩을 설정합니다.   위쪽 0,  오른쪽 20px,  아래쪽 30px, 왼쪽 20px */
            padding:             0             20px         30px         20px;

            /*마진을 설정합니다.  모든 방향 15px로 바깥여백 띄우기*/
            margin: 15px;
            
            /*줄 간격 글자크기의 2배로 설정*/
            line-height: 2;
        }

    </style>

</head>
<body>
    <script>
        /*
            [주제]
            중첩 for문 (바깥 for 안에 안쪽 for를 함께 사용한 구문)으로
            1단부터 9단까지 구구단을 HTML + CSS 형태로 화면에 출력합니다.

            [중첩 for문이란?]
            for문 안에 또 다른 for문을 넣는 방식입니다.
            바깥 for가 1번 반복할때, 안쪽 for는 처음부터 끝까지 반복해서 전부 실행됩니다.
        */
        // i : 바깥 for에서 사용 (현재 몇 단인지, 1~9)
        // j : 안쪽 for에서 사용 (곱하는 수, 1~9)
        let i, j;

        /*
            [바깥쪽 for문]
            i = 1에서 시작 -> i가 9 이하일 때 까지 반복 -> 한 번 반복할때 마다 i를 1씩 증가 
            즉, 1단, 2단, 3단 .... 9단을 차례로 만듭니다.
        */
       for(i = 1;   i <= 9;   i++){

            //각 단마다 CSS가 적용된 박스(div)를 시작합니다.
            // 위쪽 <style>에  div {  border,  padding,  margin .... } 이 적용 됩니다.
            document.write("<div>");

                //현재 단 번호를 제목태그(h3)으로 출력합니다.
                //예 : i가 3이면 화면에  <h3>3단</h3> 이 만들어져 출력 됩니다.
                document.write("<h3>" + i + "단</h3>");

                /*
                    [안쪽 for문]
                    j = 1에서 시작 -> j가 9이하 일때 까지 반복 -> 한 번 반복할때 마다 j를 1씩 증가
                    바깥 for의 i 값(현재 단)은 그대로 두고, j만 1부터 9까지 바뀝니다.

                    예) i = 4일 때:
                       j = 1  ->  4 X 1 = 4
                       j = 2  ->  4 X 2 = 8
                       ...
                       j = 9  ->  4 X 9 = 36
                */
               for(j = 1;   j <= 9;  j++){

                    //구구단 한 줄을 출력합니다.
                    //i  *  j : 곱셈 결과 (예:  5  X  3 = 15에서 15)
                    document.write(i  + " X " + j + " = " + i * j + "<br>");

               }//안쪽 for문 끝 (j가 10이 되면 여기로 나옵니다.)


            document.write("</div>");    

       }



    </script>
</body>
</html>
