<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            for 반복문 작성 문법

                    for(초기식;    조건식;     증감식){
                    
                        조건식의 결과값이 true(참)일 경우에만 반복할 실행코드;
                    
                    }
        */
        // "반복" 글자를 10번 반복해서 출력
        //풀이 : i변수값 1에서 10이 될때 까지 계속 "반복" 글자를 10번 반복해서 출력
        for (let i=1;   i<=10;   i++) {

                document.write("반복<br>");
                /*
                    반복
                    반복
                    반복
                    반복
                    반복
                    반복
                    반복
                    반복
                    반복
                    반복
                */
        }
        /*  
            동작순서
                1.  변수 i 에 초기값 1을 저장함.
                2.  조건식 i <= 10; 검사 후 결과가 true일경우
                    { } 중괄호 내부의 실행문 실행!
                3.  i++ 증가연산자로 변수 i에 저장된 값을 1증가시켜 다시 저장함!
                4.  다시~~ 조건식 i <= 10; 을 검사해서 
                    만약 true일경우 이면  2.3.4. 순서를 다시 반복한다.
                    만약 fasle일경우 이면 for의  {} 중괄호를 완전히 빠져나감 

        */

    </script>

    
</body>
</html>
