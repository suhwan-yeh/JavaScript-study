<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        /*
        
            주제 : <button>에 두가지 이벤트 등록 방식으로 click이벤트와 mouseover 이벤트를 등록시켜 
                   사용자가 이벤트를 했을ㄸ때 배경색이 바뀌도록 하는 예제.

            이벤트 등록 방식1. 요소에 직접 이벤트를 등록하는 방식 
                    문법 : 
                            <태그명 on이벤트 종류명 = "이벤트처리함수호출">< /태그명>;

            이벤트 등록 방식2. DOM을 이용한 이벤트 등록하는 방식
                    문법 : 
                            요소노드선택.on이벤트종류명 = "이벤트처리함수작성";
        */
        //1. <body ></body> 배경색상 설정할 문자열들을 배열을 생성해서 보관 
        let color = ["white", "yellow", "aqua", "purple"];
        //              0       1          2        3 

        //2. 위 color 배열의 index 위치 번호가 저장될 변수 
        let i = 0;

        //3. 위 color 배열에 배경색상 문자열을 이용해 아래에 작성된 <button>을 클릭할때마다 호출되어
        // <body></body>의 배경색 변경하는 기능의 함수 
        function colorBg(){

            i++;

            //선택한 body 요소 영역에 color배열의 각칸에 저장된 i변수 번째 index 위치 값으로 설정
            let bodyTag = document.getElementsByTagName("body")[0];

            
            bodyTag.style.backgroundColor = color[1];
        };

        window.onload = function(){

            
        }





    </script>



</head>
<body>
    <p>
        <!-- 
            이벤트 등록 방식1. 요소에 직접 on이벤트 종류명을 작성해서 이벤트 등록 
            -> 버튼 1을 한번 클릭하면 colorBg(); 함수를 호출되게 하여 이벤트 처리하자 
        -->
        <button onclick="colorBg();">버튼1</button>
    </p>
    <p>

        <!-- 
            이벤트 등록 방식2. 자바스크립트 코드로 등록할 요소 선택 후 on이벤트종류 명을 작성해 이벤트 등록
            -> 버튼2을 한번 클릭하면 colorBg(); 함수를 호출되게 하여 이벤트 처리 
        -->
        <button id="btn2">버튼2</button>
    </p>





    <p>
        <!-- 이벤트 등록방식 1. 요소에 직접 on 이벤트종류명을 작성해서 이벤트 등록
            -> 버튼3에 마우스포인터를 올리는 동작(mouseover 이벤트)를 했을때 colorBg() 함수를 호출! 
        -->
        <button onmouseover="">버튼3</button>
    </p>
    <p>
        <!-- 이벤트 등록 방식2. 자바스크립트 코드로 등록할 요소 선택 후 on이벤트종류 명을 작성해 이벤트 등록 -->
        <button>버튼4</button>
    </p>





</body>
</html>
