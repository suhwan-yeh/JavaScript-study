<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/modal-result.css ">
</head>
<body>
    <button>프로필 보기</button>
    <div id="model-box">
        <div id="model-contents">
            <button id="close">&times;</button>
            <h1 id="title">My Profile</h1>
            <div id="Profile">
                <img src="images/pf.png" alt="도래미">
                    <div id="desc">
                        <p class="user">이름 : 도레미</p>
                        <p class="user">주소 : somewhere</p>
                        <p class="user">연락처 : 1234567</p>
                    </div>
            </div>


        </div>
    </div>
    <script>
        /*
            1. <button>프로필 보기</button> 선택해서 저장
        */

            const open = document.querySelector("button");

        /*
            2. 모델창 영억 <div id="model-box">....</div> 선택해서 저장    
        */
            const modelbox = document.querySelector("#model-box");

        /*
            3. 모델창 영역 내부 오른쪽 상단위 x디자인 button id=close 불러서 저장
        */

            const close = document.querySelector("#close");

        /*
            4. 1에서 선택한 프로필 보기 click 이벤트에 등록
        */
            open.addEventListener("click",() => {

                /* 
                    4.1. 클릭하면 classList 속성에 포함된 add() 메소드를 사용해서
                    class = active 를 div id=model-box 에 추가 
                */
                modelbox.classList.add("active");

            });


    </script>
</body>
</html>
