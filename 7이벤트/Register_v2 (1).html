<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Insert title here</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f6fb;
            color: #222;
        }

        .signup-container {
            max-width: 760px;
            margin: 40px auto;
            padding: 24px;
        }

        .signup-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        .signup-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .signup-table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
        }

        .signup-table td {
            padding: 10px;
            border: 1px solid #dce4ef;
            vertical-align: top;
        }

        .signup-table input[type="text"],
        .signup-table input[type="password"],
        .signup-table select,
        .signup-table textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfd8e3;
            border-radius: 8px;
            font-size: 14px;
        }

        .signup-table textarea {
            min-height: 100px;
            resize: vertical;
        }

        .signup-table button,
        .signup-table input[type="button"] {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }

        .signup-table button:hover,
        .signup-table input[type="button"]:hover {
            background: #1d4ed8;
        }

        span {
            color: red;
        }

        @media (max-width: 600px) {
            .signup-container {
                padding: 16px;
                margin: 20px auto;
            }

            .signup-card {
                padding: 16px;
            }

            .signup-table td {
                display: block;
                width: 100%;
            }
        }
    </style>
</head>

<body>
  <div class="signup-container">
    <div class="signup-card">
      <div class="signup-title">회원가입</div>

      <table class="signup-table">
        <tr>
            <td colspan="2" align="center">회원가입</td>
        </tr>
        <tr>
            <td>*이름</td>
            <td>
                <input type="text" name="uName" id="uName" placeholder="김개똥" />
                <span id="name">이름을 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*ID</td>
            <td>
                <input type="text" name="uID" id="uID" placeholder="admin" />
                <span id="id">ID를 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*비밀번호</td>
            <td>
                <input type="password" name="uPWD" id="uPWD" placeholder="1234" />
                <span id="pwd">비밀번호를 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*비밀번호 확인</td>
            <td>
                <input type="password" name="uPWD_Confirm" id="uPWD_Confirm" />
                <span id="pwd_confirm">비밀번호 확인란 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*주소</td>
            <td>
                <input type="text" id="sample4_postcode" placeholder="우편번호">
                <input type="button" onclick="sample4_execDaumPostcode()" value="우편번호 찾기"><br>
                <input type="text" id="sample4_roadAddress" placeholder="도로명주소">
                <input type="text" id="sample4_jibunAddress" placeholder="지번주소">
                <span id="guide" style="color:#999;display:none"></span>
                <input type="text" id="sample4_detailAddress" placeholder="상세주소">
                <input type="text" id="sample4_extraAddress" placeholder="참고항목">     
            </td>
        </tr>
        <tr>
            <td>*직업</td>
            <td>
                <select name="work" id="work">
                    <option value="직업명" selected>직업명</option>
                    <option value="기타">기타</option>
                    <option value="회사원">회사원</option>
                    <option value="학생">학생</option>
                </select>
                <span id="work-error">직업 하나를 선택해 주세요</span>
            </td>
        </tr>
        <tr>
            <td>*성별</td>
            <td>
                남자<input type="radio" name="sex" id="s1" value="male" />
                여자<input type="radio" name="sex" id="s2" value="female" />
                <span id="gender-error">성별을 체크해 주세요</span>
            </td>
        </tr>
        <tr>
            <td>*취미</td>
            <td>
                <input type="checkbox" name="hobby" id="h1" value="독서" />독서
                <input type="checkbox" name="hobby" id="h2" value="등산" />등산
                <input type="checkbox" name="hobby" id="h3" value="낚시" />낚시
                <span id="hobby-error">취미를 하나이상 체크 해 주세요</span>
            </td>
        </tr>
        <tr>
            <td>*가입동기</td>
            <td>
                <textarea rows="20" cols="100" name="motivation" placeholder="가입동기를 두줄 이상 입력 하시오."></textarea>
                <br><span id="motivation-error">가입 동기를 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td colspan="2" align="center">
                <input type="button" value="가입" id="submit" />
            </td>
        </tr>
    </table>

    <!-- 카카오 우편번호 API 서비스 적용 -->
    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <script>
    //-----------------------카카오 우편번호 주소 API 관련 코드----------------------------
    //이 함수는 '우편번호 찾기' 버튼을 눌렀을때 실행됩니다.
    //다음(카카오)에서 제공하는 우편번호 검색 팝업창을 띄워 사용자가 주소를 선택하면,
    //해당 주소 정보를 가져와 입력창에 자동으로 채워줍니다.
    function sample4_execDaumPostcode() {
        new kakao.Postcode({
            oncomplete: function(data) {
                // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

                // 도로명 주소의 노출 규칙에 따라 주소를 표시한다.
                // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                var roadAddr = data.roadAddress; // 도로명 주소 변수
                var extraRoadAddr = ''; // 참고 항목 변수

                // 법정동명이 있을 경우 추가한다. (법정리는 제외)
                // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
                if(data.bname !== '' && /[동로가]$/.test(data.bname)){
                    extraRoadAddr += data.bname;
                }
                // 건물명이 있고, 공동주택일 경우 추가한다.
                if(data.buildingName !== '' && data.apartment === 'Y'){
                   extraRoadAddr += (extraRoadAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                }
                // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
                if(extraRoadAddr !== ''){
                    extraRoadAddr = ' (' + extraRoadAddr + ')';
                }

                // 우편번호와 주소 정보를 해당 필드에 넣는다.
                document.getElementById('sample4_postcode').value = data.zonecode;
                document.getElementById("sample4_roadAddress").value = roadAddr;
                document.getElementById("sample4_jibunAddress").value = data.jibunAddress;
                
                // 참고항목 문자열이 있을 경우 해당 필드에 넣는다.
                if(roadAddr !== ''){
                    document.getElementById("sample4_extraAddress").value = extraRoadAddr;
                } else {
                    document.getElementById("sample4_extraAddress").value = '';
                }

                var guideTextBox = document.getElementById("guide");
                // 사용자가 '선택 안함'을 클릭한 경우, 예상 주소라는 표시를 해준다.
                if(data.autoRoadAddress) {
                    var expRoadAddr = data.autoRoadAddress + extraRoadAddr;
                    guideTextBox.innerHTML = '(예상 도로명 주소 : ' + expRoadAddr + ')';
                    guideTextBox.style.display = 'block';

                } else if(data.autoJibunAddress) {
                    var expJibunAddr = data.autoJibunAddress;
                    guideTextBox.innerHTML = '(예상 지번 주소 : ' + expJibunAddr + ')';
                    guideTextBox.style.display = 'block';
                } else {
                    guideTextBox.innerHTML = '';
                    guideTextBox.style.display = 'none';
                }
            }
        }).open();
    }
    //-----------------------------------------------------------------------------------------------------------------------
	    
        //------------------------------------------------------------
	    //---------------------회원 가입 유효성 검사 코드-----------------------
	    //이 블록 전체는 '회원가입 폼' 에서 사용자가 입력하는 값을 실시간으로 검사하고,
	    //화면에 오류 메세지를 표시하며, 모든 항목이 유효해야만 가입 처리를 허용하도록 돕습니다.
	    //클라이언트(웹브라우저)에서 동작하는 검증이며, 보안상으로는 서버에서도 반드시 같은 검증을 수행해야 합니다.
	    
	    //---------------------상수(항목 인덱스) 정의------------------------
	    //verificationType 객체는 각 검사 항목을 의미하는 이름과 정수값을 속성:값 형태로 저장하였습니다.
	    //배열 checkVerifications에서 각 항목의 상태를 index로 접근하기 쉽도록 만들기 위함 입니다.
	    //(예: checkVerifications[verificationType.NAME] 은 '이름' 검증 결과를 가리킵니다)
        const verificationType = {   
            NAME : 0,       //이름 항목 인덱스  : 0
            ID :   1,       //아이디 항목 인덱스 : 1
            PWD :  2,       //비밀번호 항목 인덱스 : 2
            PWD_CONFIRM : 3,//비밀번호 확인(재입력) 항목 인덱스 : 3
            JOB : 4,        //직업 선택 항목 인덱스 : 4
            GENDER : 5,     //성별 선택 항목 인덱스 : 5
            HOBBY : 6,      //취미(체크박스) 항목 인덱스 : 6
            MOTIVATION : 7, //가입동기(textarea) 항목 인덱스 : 7
        };
	    /*
	    	참고. Object.freeze()란?
	    		 - 위 freeze메소드의 기능은 자바스크립트의 내장 메서드로,
	    		   객체를 "동결(freeze)"시켜 불변 상태로 만드는 함수입니다.
	    		   즉, 객체의 속성을 추가, 수정, 삭제할 수없게 잠그는 기능을 합니다.
	    */
       	//Object.freeze메소드는 전달한 객체를 더이상 수정할수 없게 만듭니다.
	    //이렇게 하면 이후 코드에서 누군가 실수로 verificationType객체의 속성:값 형태를 변경하는 것을 방지합니다.
        Object.freeze(verificationType);

        //---------------- 유효성 검사 결과 값들을 저장할 배열 초기화-------------------------
        //checkVerifications 배열은 각 항목의 '검증 통과 여부'를  true 또는 false로 저장한다.
        //초깃값은 모두 false(아직 검사하지 않았거나, 미통과 상태)로 설정한다.

        //배열은 빈 상태의 배열 선언
        let checkVerifications = [];

        //참고.Object.keys(verificationType).length 는 
        //   [NAME, ID, PWD, PWD_CONFIRM, JOB, GENDER, HOBBY, MOTIVATION].length 는 
		//    위에 정의한 verificationType객체의 속성(키)의 개수 8을 반환합니다.

        //verificationType 객체에 만들어져 있는 속성의 갯수만큼 false를 checkVerifications배열에 넣어 저장 
        for(let i=0;  i<Object.keys(verificationType).length;   i++){
//                    i<8;
            checkVerifications.push(false); //push메소드로 배열 끝에 false 반복해서 추가 
        }
        // checkVerifications 배열 모습
        //[false, fasle, fasle, false, false, false, false, false]
        //   0      1      2     3        4     5     6       7         index	

        //모두 false가 저장된 것의 의미  : 유효성 검사 통과 하지 않음
        //모두 true가 저장된 것의 의미   : 유효성 검사 통과 했음 
        
        //---------------------- 이름 유효성 검사 -------------------------
        const inputName = document.getElementById("uName"); //<input id="uName"> 이름 입력 요소 선택
        const nameError = document.getElementById("name");  //<span id="name">이름을 입력해주세요</span> 요소 선택 

        //사용자 키 입력(키를 누르고 땔때) 이벤트를 <input id="uName">에 등록 
        inputName.addEventListener("keyup", validateName);

        //validateName 함수 : 이름이 비어 있지 않는지 검사하고 결과(true 또는 false)를 
        //                    checkVerifications 배열에 저장
        function validateName(){
            
            if(inputName.value.trim()  === ""){//이름 입력 하지 않았다면?
                //사용자에게 안내메세지를 보여주기 위해 안내메세지 "이름을 입력해주세요"를 
                //  <span id="name">이름을 입력해주세요</span> 이렇게 넣어서 보여주자
                nameError.innerText = "이름을 입력해주세요";

                //검증 결과 값을 checkVerifications배열의 0 index 칸에 false로 저장
                checkVerifications[verificationType.NAME] = false;
              //checkVerifications[          0          ] = false;

                 //[false <-, fasle, fasle, false, false, false, false, false]
                //   0          1      2     3        4     5     6       7         index 
            }else{
                //이름을 입력 했다면? 오류 메세지를 지우고 통과로 표시
                nameError.innerText = "";

                //검증 결과 값을 checkVerifications배열의 0 index 칸에 true로 저장
                checkVerifications[verificationType.NAME] = true;

               //[true <-,  fasle, fasle, false, false, false, false, false]
                //   0          1      2     3        4     5     6       7         index 	 

            }
        }//validateName() 함수 끝 

        //------------------------ 아이디 유효성 검사 ------------------------------
        //  아이디 입력 <input>과 해당 오류메세지 표시할 <span>요소를 선택해서 가져온다.
        const inputId = document.getElementById("uID");
        const idError = document.getElementById("id");

        // 아이디 입력 <input>에 키를 누르고 있다가 뗀 동작(keyup이벤트) 등록
        inputId.addEventListener("keyup", validateID);

        // 이벤트 핸들러 함수 validateID 정의
        // 기능: 아이디를 입력했는지 검사, 아이디 입력시 3 ~ 7 입력 안했는지 검사, 제대로 둘다 입력했는지 검사 
        function validateID(){

            //아이디를 입력 하지 않았다면?
            if(inputId.value.trim() === ""){
                idError.innerText = "아이디를 입력해 주세요"; 
                checkVerifications[verificationType.ID] = false;
            //  checkVerifications[           1       ] = false; 

            //아이디 입력시 3 ~ 7 사이로 입력하지 않았다면?
            }else if(inputId.value.trim().length < 3  ||  inputId.value.trim().length > 7){
                idError.innerText = "3 ~ 7자로 입력해주세요";
                checkVerifications[verificationType.ID] = false;
            
            //아이디 입력 했고, 3 ~ 7 사이로 입력 했다면?
            }else{
                //모든 조건 통과시 오류 메세지 제거 및 
                // 성공 true 값  checkVerifications 배열의 1 index위치칸에 저장
                idError.innerText = "";
                checkVerifications[verificationType.ID] = true;
				//[false ,  true <-, fasle, false, false, false, false, false]
				//   0        1       2     3        4     5     6       7         index   
            }
        }// validateID() 함수 끝 

        //-----------------  비밀번호 유효성 검사 -----------------------
        //비밀번호 입력할수 있는 <input>요소와   해당 오류 메세지 보여줄 <span>을 각각 선택해서 가져온다
        const inputPwd = document.getElementById("uPWD");
        const pwdError = document.getElementById("pwd");

        //비밀번호 입력할수 있는 <input>요소에 keyup이벤트 등록 후 처리 
        inputPwd.addEventListener("keyup", validatePassword);

        function validatePassword(){
        //처리내용1.  비밀번호 입력하지 않았는지 검사 후  입력하지 않았으면? <span>사이에 "비밀번호 입력해주세요" 보여준다. 
        //           그리고  checkVerifications 배열의 2 index 칸에  false 저장 
        if(inputPwd.value.trim() === ""){

            pwdError.innerText = "비밀번호 입력 해주세요";
            checkVerifications[verificationType.PWD] = false;
        }

         
        //처리내용2.  비밀번호  4~10 사이로 입력하지 않았다면? <span>사이에  "4~10자로 입력해주세요" 보여준다.
        //           그리고  checkVerifications 배열의 2 index 칸에  false 저장  
        else if(inputPwd.value.length < 4 || inputPwd.value.length > 10){

            pwdError.innerText = "4 ~ 10자로 입력해주세요"
            checkVerifications[verificationType.PWD] = false;
        }
        //처리내용3.  처리내용1과 처리내용2 의 모든 조건이 성립 한다면? <span>사이에 ""넣어서 오류메세지 제거해서 보여준다.
        //          그리고  checkVerifications 배열의 2 index 칸에  true 저장 
        else{
            pwdError.innerText = "";
            checkVerifications[verificationType.PWD] = true;
        }
    }

        const pwdConfirmError = document.getElementById("pwd_confirm");

            if(inputPwdConfirm.value.trim()===""){

            }else{
                
            }

        });

    </script>


</body>

</html>
