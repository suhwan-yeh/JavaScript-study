<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f6fb;
            color: #222;
        }

        .signup-container {
            max-width: 760px;
            margin: 40px auto;
            padding: 24px;
        }

        .signup-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        .signup-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .signup-table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
        }

        .signup-table td {
            padding: 10px;
            border: 1px solid #dce4ef;
            vertical-align: top;
        }

        .signup-table input[type="text"],
        .signup-table input[type="password"],
        .signup-table select,
        .signup-table textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfd8e3;
            border-radius: 8px;
            font-size: 14px;
        }

        .signup-table textarea {
            min-height: 100px;
            resize: vertical;
        }

        .signup-table button,
        .signup-table input[type="button"] {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }

        .signup-table button:hover,
        .signup-table input[type="button"]:hover {
            background: #1d4ed8;
        }

        span {
            color: red;
        }

        @media (max-width: 600px) {
            .signup-container {
                padding: 16px;
                margin: 20px auto;
            }

            .signup-card {
                padding: 16px;
            }

            .signup-table td {
                display: block;
                width: 100%;
            }
        }
    </style>
</head>

<body>
  <div class="signup-container">
    <div class="signup-card">
      <div class="signup-title">회원가입</div>

      <table class="signup-table">
        <tr>
            <td colspan="2" align="center">회원가입</td>
        </tr>
        <tr>
            <td>*이름</td>
            <td>
                <input type="text" name="uName" id="uName" placeholder="김개똥" />
                <span id="name-error">이름을 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*ID</td>
            <td>
                <input type="text" name="uID" id="uID" placeholder="admin" />
                <span id="id-error">ID를 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*비밀번호</td>
            <td>
                <input type="password" name="uPWD" id="uPWD" placeholder="1234" />
                <span id="pwd-error">비밀번호를 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*비밀번호 확인</td>
            <td>
                <input type="password" name="uPWD_Confirm" id="uPWD_Confirm" />
                <span id="pwd-confirm-error">비밀번호 확인란을 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*직업</td>
            <td>
                <select name="work" id="work">
                    <option value="직업명" selected>직업명</option>
                    <option value="기타">기타</option>
                    <option value="회사원">회사원</option>
                    <option value="학생">학생</option>
                </select>
                <span id="work-error">직업 하나를 선택해 주세요</span>
            </td>
        </tr>
        <tr>
            <td>*성별</td>
            <td>
                남자<input type="radio" name="sex" id="s1" value="male" />
                여자<input type="radio" name="sex" id="s2" value="female" />
                <span id="gender-error">성별을 체크해 주세요</span>
            </td>
        </tr>
        <tr>
            <td>*취미</td>
            <td>
                <input type="checkbox" name="hobby" id="h1" value="독서"  />독서
                <input type="checkbox" name="hobby" id="h2" value="등산" />등산
                <input type="checkbox" name="hobby" id="h3" value="낚시" />낚시
                <span id="hobby-error">취미를 하나 이상 체크 해 주세요</span>
            </td>
        </tr>
        <tr>
            <td>*가입동기</td>
            <td>
                <textarea rows="4" cols="50" name="motivation" id="motivation"
                    placeholder="가입동기를 두 줄 이상 입력 하시오."></textarea>
                <span id="motivation-error">가입 동기를 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td colspan="2" align="center">
                <input type="button" value="가입" id="submit-btn" />
            </td>
        </tr>
    </table>

    <script type="text/javascript">
 	    /**
	     * 아래 코드는 "입력값 검사(Validation)"를 아주 세부적으로 처리합니다.
	     * 주석은 각 줄(혹은 블록)마다 붙여서 무슨 역할을 하는지, 왜 필요한지, 어떤 경우에 true/false가 되는지
	     * 가능한 한 쉽게(비전공자 관점) 풀어썼습니다.
	     *
	     * 핵심 개념 요약:
	     * - "요소 찾기": document.getElementById("id") 같은 함수로 화면의 입력창을 찾는다.
	     * - "이벤트 연결": 사용자가 입력하거나 클릭할 때 '검사 함수'를 자동으로 실행하도록 연결한다.
	     * - "검사 함수": 입력값을 확인해서 문제가 있으면 화면에 오류문구를 보여주고 false를 반환한다.
	     * - "모두 통과하면": 최종적으로 true이면 가입 처리를 진행(여기서는 alert만 표시).
	     */  
        /*
            1) 이벤트 연결 함수 : 웹브라우저가 Register_v3.html 웹문서의 모든 HTML태그들 로드 하면
                                호출되는 함수로 기능은 다양한 입력요소를 선택해서 이벤트 등록 후 
                                이벤트 핸들러 함수 호출!
        */
         function setEventListeners(){

            //1. 이름 입력 <input>요소 선택 하고, keyup 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("uName").addEventListener("keyup",validateName);
            
            //2. 아이디 입력 <input>요소 선택 하고, keyup 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("uID").addEventListener("keyup", validateID);

            //3. 비밀번호 입력 <input>요소 선택 하고, keyup 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("uPWD").addEventListener("keyup", validatePassword);

            //4. 비밀번호 확인 입력 <input>요소 선택 하고, keyup 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("uPWD_Confirm").addEventListener("keyup", validatePasswordConfirmation);

            //5. 직업 선택 할수 있는 <select>요소 선택 하고, "change" 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("work").addEventListener("change", validateWork);    

            //6. 성별 선택 할수 있는 <input type="radio">요소들을 각각 선택하고, "change" 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("s1").addEventListener("change", validateGender);
            document.getElementById("s2").addEventListener("change", validateGender);

            //7. 취미 체크 할수 있는 <input type="checkbox">요소들을 각각 선택하고, "change" 이벤트 등록후 이벤트 핸들러 함수 호출
            document.getElementById("h1").addEventListener("change", validateHobby);   
            document.getElementById("h2").addEventListener("change", validateHobby);       
            document.getElementById("h3").addEventListener("change", validateHobby);       

            //8. 가입 동기 한줄 이상 입력 할수 있는 <textarea></textarea>요소를 선택하고, "keyup"이벤트 등록 후 
            //   실시간 입력한 값을 체크 하기 위해 이벤트 핸들러 함수 호출
            document.getElementById("motivation").addEventListener("keyup", valdateMotivation);
            
            //9. 최종 제출 버튼(가입)을 클릭하면 전체 입력을 검사 하는 validateForm() 이벤트 핸들러 함수 호출
            document.getElementById("submit-btn").addEventListener("click", validateForm);
         }

         /*
            2) 전체 폼 양식 화면의 입력을 검사하는 함수 
              - 페이지의 모든 항목을 한번에 검사
              - 각 항목 검사 함수들은 true 반환받으면 (정상),  false 반환받으면 (실패)
              - 모든 함수가 true반환 받아야 valid가 true되고, 가입 진행(여기서 alert('가입요청')) 실행.
         */
        function validateForm(){

            //배열을 만들어서 배열 내부에서  각 검사 함수를 호출해서 true 또는 false를 반환 받아 각 칸에 저장
            let results = [  validateName(),     //   true  또는 false 이자리에 저장됨 
                             validateID(),       //   true  또는 false 이자리에 저장됨 
                             validatePassword(),//    true  또는 false 이자리에 저장됨 
                             validatePasswordConfirmation(), // true  또는 false 이자리에 저장됨 
                             validateWork(),     //true  또는 false 이자리에 저장됨 
                             validateGender(),   //true  또는 false 이자리에 저장됨 
                             validateHobby(),    //true  또는 false 이자리에 저장됨 
                             valdateMotivation() //true  또는 false 이자리에 저장됨 
                          ];
			//배열명.every(Boolean) 사용 설명:
			// - 배열에 저장된 모든 요소가 참(true)이 저장되어 있으면 true반환.
			// - Boolean 은 JS의  내장 함수로 값들을 true/false로 바꿔준다.
			// 예 : [true, true, true].every(Boolean) => true
			//   : [true, false, true].every(Boolean) => false

            let valid = results.every(Boolean);

            //valid 가 true이면 (모든 입력요소들  입력했으니 통과) ----> 서버페이지로 가입요청 가능
            if(valid){
                alert('유효성 통과 되었으니 회원가입 요청 합니다.');
            }else{
                //어떤 항목이 문제인지 사용자는 각 항목 옆의 빨간 문구를 보면 알수 있음
				//(문자가 있는 항목의 검사함수가 그 자리에서 에러 문구를 채움)
            }  
           
        }

        /*  3) 개별 유효성 검사 함수들 - 각 항목 별 검사   */
        //3-1. 이름 검사
        function validateName(){
            /*  공통 검사 함수(validateField)를 재사용:
                "uName"입력 값을 검사하고, 오류는 id="name-error"에 표시, 허용 길이는 3~7자, 화면에 표시되는 이름은 "이름"    */
            return validateField("uName", "name-error", 3, 7, "이름");
        }
        
        //3-2. ID 검사
        function validateID(){
            return validateField("uID",  "id-error", 3, 7, "ID");  //공통 검사 함수 (validateField)를 재사용.
        }
        
        //3-3. 비밀번호 검사
        function validatePassword(){
            return validateField("uPWD", "pwd-error", 3, 7, "비밀번호"); //공통 검사 함수 (validateField)를 재사용.
        }
        
        //3-4. 비밀번호 확인 입력 검사( 3-3. 비밀번호에서 입력한 비밀번화 같은지 검사 )
        function validatePasswordConfirmation(){

            let inputPWD = document.getElementById("uPWD").value.trim();//입력한 비밀번호 얻기 
            let inputPWDConfirm = document.getElementById("uPWD_Confirm").value.trim(); //입력한 비밀번호 확인 값 얻기 

            let errorMessage = document.getElementById("pwd-confirm-error"); //오류메세지 보여줄 <span></span> 요소 얻기 

            //경우1 : 비밀번호 확인 값 입력하지 않았다면?
            if(inputPWDConfirm === ''){
                errorMessage.innerHTML = "<strong>비밀번호 확인 입력 값 확인 바람</strong>";
                return false;
            }
            //경우2 : 입력한 비밀번호와 입력한 비밀번호 확인 값 같지 않느냐?
            else if(inputPWD !== inputPWDConfirm){
                errorMessage.innerHTML = "<strong>입력한 비밀번호와 비밀번호 확인 값이 일치하지 않습니다</strong>";
                return false;
            }   
            //경우3 : 정상
            else{
                errorMessage.innerText = "";
                return true;
            }

        }
        
        //3-5. 직업 선택 검사 
        function validateWork(){
           let selectWork = document.getElementById("work");       //<select id="work"></select> 요소 선택
           let workError  = document.getElementById("work-error"); //<span id="work-error"></span> 요소 선택

            //<select>요소 내부에 작성된 <option>의 value속성값이 "직업명" 과 같다면?
            //요약 : 3개의 직업 선택을 하지 않은 경우 
            if(selectWork.value === '직업명'){
                
                //사이트 이용자가 선택을 하지 않았음을 알려주는 메세지를 <span>사이에 보여주자
                workError.innerText = '직업은 무조건 하나이상은 선택 해야 합니다';
                return false;

            }else{// 3개의 option 직업 선택 중 하나라도 선택 한 경우 

                //사이트 이용자가 하나의 직업을 선택 했으니 <span>사이의 오류메세지 제거를 위해 "" 넣어보여주자
                workError.innerText = '';
                return true;    
            }

        }
        
        //3-6. 성별 검사(라디오 버튼)
        function validateGender(){

            //오류 메세지를 보여줄 <span id="gender-error"></span> 요소 선택 해서 genderError변수에 저장
            let genderError = document.getElementById("gender-error");

            //남자, 여자 라디오 <input type="radio">들을 모두 선택하지 않았다면?
            //참고===================>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> ! 논리부정연산자 -> checked가 false이면 !false는 true됨
            if( !document.getElementById("s1").checked  &&  !document.getElementById("s2").checked ){
            
                //<span>요소 사이에 '성별 두개 중에 하나를 클릭해서 체크해 주세요' 문자열 넣어 보여주기
                genderError.innerText =  '성별 두개 중에 하나를 클릭해서 체크해 주세요';
                return false;

            } else{//하나라도 라디오 <input type="radio">가 선택되어 있다면?
                
                //<span>요소 사이에 ''를 넣어 보여주자
                genderError.innerText = '';
                return true;    
            }          
        }

        //3-7. 취미 검사(체크박스 여러 개 중 하나 이상 체크(선택))
        function validateHobby(){

            //오류 메세지 표시할<span id="hobby-error"></span>요소 선택해서 가져옴
            let hobbyError = document.querySelector('#hobby-error');

			//name="hobby" 인 모든 체크박스 3쌍을 찾아 NodeList배열에 담아 선택해서 가져옴
			// 예: <input type="checkbox" name="hobby" ...> 이런 것들을 모두 선택
            let hobbies = document.querySelectorAll('input[name="hobby"]');
//[ <input type="checkbox"...독서   />,    <input type="checkbox"...등산/>,  <input type="checkbox"...낚시/>   ]
//             0                                  1                            2

            //"하나라도 체크가 되어 있는지" 판단 값 저장할 플래그변수 선언
            let isChecked = false;  // false 저장 -> 하나도 체크 되지 않음
                                    // true 저장 -> 하나이상 체크됨 

           	//for 반복문으로 모든 체크박스를 하나씩 검사
			//hobbies.length : 체크박스의 갯수 3
			//i는 0부터 시작해서 마지막 체크박스가 선택되어 있으면 true, 아니면 false                         
            for(let i=0;  i<hobbies.length;      i++){

                // hobbies[i].checked    : 체크박스가 선택되어 있으면 true반환하고 , 아니면 false를 반환하게 된다.
                if(hobbies[i].checked){//-> 3개의 체크박스 중 하나라도 체크가 되어 있으면?

                    isChecked = true; //체크됨

                    break;//이미 하나가 true이면 더 반복 할 필요가 없으니 for반복문 즉시 종료
                }
            }//for

            //모두 체크 되지 않으면? <span></span> 사이에 오류메세지 보여주자
            if(!isChecked){
            //   !false
            //   true
                hobbyError.innerText = '취미 하나 이상을 체크해 주세요';
                return false;  //유효성 검사 실패 값 반환
            
            }else{//하나 이상 체크되어 있다면? <span></span> 사이에 오류메세지 제거를 위해 ''문자열을 넣어주자.
                
                hobbyError.innerText = '';
                return true;  //유효성 검사 통과 값 반환
            }
        }

        //3-8. 가입 동기 검사(두 줄이상, 빈 줄 금지)
        function valdateMotivation(){

            //textarea에 입력한 값을 문자열로 얻어  let motivation 변수에 저장
            let motivation = document.getElementById("motivation").value.trim();

            //motivation변수에 저장된 입력한 문자열을  줄바꿈(\n) 기준으로 나누어  각 줄의 입력한 문자열을 배열에 담아 배열을
            //let lines 변수에 저장    			
            let lines = motivation.split('\n'); //예: "안녕하세요\n가입합니다" => ["안녕하세요", "가입합니다"]	
            //["안녕하세요", "가입합니다"] <---- 배열
      
            //오류 메세지를 표시할 span 요소 얻어  let errorMessage 변수에 저장
            let errorMessage = document.getElementById("motivation-error");

            //경우1 : textarea에 아무것도 입력되지 않았을 경우
            if(motivation === ''){
                errorMessage.innerText = '가입 동기를 입력 해 주세요';
                return false;
            } 
            //경우 2: 입력한 줄 수가 2줄 미만(한 줄뿐) 또는 줄들 중에 공백(빈 줄)인 줄이 하나라도 있으면? 오류메세지를 보여주자              
            //lines.length < 2  : 입력한 줄 수 가 2줄 미만(한 줄뿐)이냐?
            //lines.some( line => line.trim() === "" ) : 배열의 각 줄에 대해 앞뒤 공백을 제거 했을때 빈 문자열이면 true,
			//											 즉 "빈 줄이 하나라도 있는지" 검사 
            //                           lines.some(function(line){  return  line.trim() === "" }  );
            else if(lines.length < 2  ||  lines.some( line => line.trim() === "")  ){
                errorMessage.innerText = '가입 동기는 두 줄 이상 입력해 주세요';
                return false;
            }
            //경우 3: 두 줄 이상 가입 동기 입력 했다면?
            else {
                errorMessage.innerText = '';
                return true;
            }

        }
        //------------------------------------------------------------------------------------------


        /*
            4) 공통 검사 함수  : 여러 입력요소 (이름, 아이디, 비밀번호)에 재사용
            
            매개변수 목록 
            - inputId : 검사할 입력 요소의 id (예:  "uName")
            - errorId : 오류 문구를 넣은 요소의 id (예: "name-error" )
            - minLength, maxLength :  허용 글자수 범위값 
            - fieldName : 화면에 보여줄 요소명(사용자에게 보여줄 문자열)

                             //"uName", "name-error",  3,           7,   "이름"
                             //"uID"  , "id-error"  ,  3,           7,   "ID"
                             //"uPWD" , "pwd-error",   3,           7, "비밀번호"
        */       
        function validateField(inputId,  errorId, minLength, maxLength, fieldName ){  //<----- validateField("uName", "name-error", 3, 7, "이름");

                //지정한 입력 요소에 입력한 문자열 가져오기 
                //예: inputId가 "uName"이면 document.getElementById("uName").value로 입력한 이름 문자열 얻기
                //예: inputId가  "uID"이면  document.getElementById("uID").value로 입력한 ID문자열 값 얻기 
                //예: inputId가  "uPWD"이면  document.getElementById("uPWD").value로 입력한 비밀번호 문자열 값 얻기 
                let input = document.getElementById(inputId).value.trim();

                //오류 메세지를 보여줄 span 요소 영역 가져오기
                //예: errorId가 "name-error"이면  document.getElementById("name-error")로 
                //   <span id="name-error">이름을 입력해주세요</span> 요소 가져오기 
                let errorMessage = document.getElementById(errorId);

                //1) 빈값 검사  : 사용자가 아무 것도 입력하지 않았는가?
                if(input === ''){              
                    errorMessage.innerText = `${fieldName}를 입력해주세요`;  //입력하지 않았으면? -> "이름을 입력해주세요"         
                    return false; //유효성 검사 실패 판단할 값 반환 
                }
                //2) 길이 검사  : 글자수가 최소/최대 범위 안에 드는가?
                else if(input.length < minLength || input.length > maxLength){
                    errorMessage.innerText = `${fieldName}은 ${minLength}자에서 ${maxLength}자 사이로 입력해주세요`;
                    return false;
                }
                //3) 유효성 검사 통과 
                else{
                    //<span></span> 요소 사이에 에러 메세지를 제거해서 보여주기 위해 빈문자열 넣자.
                    errorMessage.innerText = '';
                    return true;   //유효성 검사 통과 판단 값 반환
                }
        }



        //웹브라우저가 Register_v3.html 웹문서의 모든 HTML태그를 로드 하면 함수 호출!
        setEventListeners();

    </script>
