<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/event.css">
</head>
<body>
    BODY
        <div>
            DIV
                <section>
                    SECTION
                        <p>
                            P
                        </p>
                </section>
        </div>
</body>
</html>
<script>
        //1. 현재 propagnation.html 파일에 작성된 모든 HTML요소들을 NodeList 유사배열에 담아 선택해 옵니다.
        const elements = document.querySelectorAll("*");

        //2. NodeList유사배열에 저장된 선택한 모든 HTML요소들을 순회하면서 click이벤트를 등록하고,
        //   각 HTML요소에 click이벤트가 발생하면 Event객체의 target속성과 , currentTarget속성을 호출한 값 출력
        for(let i=0;    i<elements.length;   i++){

            elements[i].addEventListener("click", function(event){

                    /*
                        html요소들 중에서 "click"이벤트가 발생한 html요소의 정보를 가지고 있는 Event객체의 
                        target속성을 호출해서 얻어 출력해보자
                    */
                    //  console.log(event.target.tagName);

                    /*
                        html요소들 중에서 "click"이벤트가 발생한 html요소의 정보를 가지고 있는 Event객체의
                        currentTarget속성을 호출해서 얻어 출력해보자
                    */
                     console.log(event.currentTarget.tagName);

                     event.stopPropagation(); //부모요소에 이벤트 전파 차단!

            },false);
            //false 뜻 : 버블링 이벤트 전파 하겠다.(자식요소에 이벤트가 발생하면 그 상위요소에도 이벤트 발생)
            //참고. false 를 작성하지 않아도 false가 자동으로 적혀 있는 거임.
        }



</script>
