<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            함수를 정의하는 방법

//-------------------------------------------------------------------------------------------------------

                방법1. 함수 선ㄴ언문 function키워드로 함수 정의 및 매개변수 처리

                    -> function 함수명(매개변수){
                                실행할 코드;
                                return 반환값;                    
                    } 
                     함수명(인수1, 인수2); 

//-------------------------------------------------------------------------------------------------------

                방법2. 함수 표현식 const 상수명 = function키워드로 함수 정의 및 매개변수 처리

                    -> const 상수명 = function(매개변수){
                                실행할 코드;
                                return 반환값;
                    }; 
                     상수명(인수1, 인수2);

//-------------------------------------------------------------------------------------------------------

                방법3. 화살표 "=>" 함수 정의 및 매개변수 처리
                    -> const 상수명 = (매개변수1, 매개변수2) => {
                    
                                실행할 코드;
                                return 반환값;
                    };
                     상수명(인수1, 인수2); 
        */
//-------------------------------------------------------------------------------------------------------
        
           // 함수를 정의하는 방법
           // 방법1. 함수 선ㄴ언문 function키워드로 함수 정의 및 매개변수 처리
        
            //함수 기능 : 매개변수로 전달받은 2개의 숫자 값을 곱해서 반환하는 기능
                function multiply(a, b){

                    console.log(`a : ${a}, b :${b}`);
                    return a*b;
                }   
            //--------------
            /*
                과정
                multiply(7); <-- 호출시, a매개변수에만 7전달, b매개변수값은 전달 x
                                 그래서 b에는 전달된게 없으니 undifined가 할당되어어
                                 console.log(`a : ${a}, b :${b}`); <- 여기서   a : 7, b : undifined 출력되고
                                 return 7 * undifined; 가 되니까 NaN이 됨
            */
            //--------------
            /*
                과정
                multiply();  <--- 호출시 a와 b매개변수는 모두 undifined가 되어 출력결과 확인 ㄱ
                                        console.log(`a : ${a}, b :${b}`);
                                         a -> undifined, b -> undifined 임
                                  그리고 return a*b;는
                                        return undifined * undifined; 이므로 NaN이 반환됨.
            */
//-------------------------------------------------------------------------------------------------------
        
         // 함수를 정의하는 방법
         // 방법3. 화살표 "=>" 함수 정의 및 매개변수 및 기본값 할당 처리

         //ex)
             /* 
                const add = (x=5, y=5) => {
                    
                    console.log(`x: ${x} , y :${y}`); 
                    return x + y;
               };
               console.log(add(3, 7)); 
             */

        /*
        정리
            매개변수 x나 y에 함수 호출시 인수를 전달하지 않으명
            undifined가 출력되는데, 이를 방지 할 수 있음  
            ex) const add = (x=5, y=5) 이게 기본값이 되는거임
            그래서 호출할때 add(3); 하면 x에 3만 대입해서 3 + 5가 됨

            ex) 호출할때 add(); 를 매개변수로 전달하면 아무것도 전달 안 하니
            기본값 const add = (x=5, y=5) 이게 기본값 이걸 호출함
            그럼 기본값을 대입해서 계산해 출력이 됨 return 하는거임임
         */

//-------------------------------------------------------------------------------------------------------







    </script>
</body>
</html>
