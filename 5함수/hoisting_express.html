<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            함수를 만드는 방법 (선언하는 방법) 3가지 중에서!!
            
            방법2. 표현식 방법으로 만들기
                const 상수명 = function(){ 실행코드 }; <- 익명함수
                const 상수명 = function 함수명(){};    <- 네이밍함수

            사용해서 호이스팅이 되는지 알아보자.
        */

        printHello();
        const printHello = function print(){

                console.log("Hello");
        };



    </script>
</body>
</html>
