<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            함수 선언 방법2
                1. 함수 선언문
                    function 함수명(변수명, 변수명2){
                    
                    실행할 코드;
                    return 반환값;
                    
                    }

                2. 함수 호출
                    함수명(매개변수1, 매개변수2);

                3. 이 실습의 핵심
                 - 함수 선언은 실행할 코드를 준비할 단계
                 - 함수 호출은 준비된 코드를 실행하는 단계
                 - 매개변수는 함수가 값(인수)을 받기 위해 선언한 변수
                 - 인수는 함수를 호출할때 전달하는 실제 값
                 - return은 함수코드 실행 결과값을 함수를 호출한한
        */
        //문제1. 두 수를 더해서 반환하는 add함수 선언
        function add(a,b){
            //a 와 b는 각각 매개변수라 부름
            // return은 a + b의 계산 결과를 함수를 호출한 줄의 자리로 되돌려 주는 예약어
            return a+b;
        }
        console.log(add(3,5));
        

        //문제2. 매개변수로 두개의 인수를 전달받아 두값 중에서 큰 값 하나를 반환하는 max함수 정의
        function max(a, b){

            if(a>b){    
              return a; //더 큰값 하나 반혼
            }else{
                return b;
            }

        }
        console.log(max(7, 10));
        
            //max 함수 호출할때 인수로 7과 10을 전달해 큰값 10을 반환받아 console.log로 출력력

        //문제3. 매개변수로 한개의 숫자를 전달 받아 양수이면 true반환, 음수이면 false를 
        //반환하는 기능의 isPositive 함수 정의
        function isPositive(a){
            
            if(a > 0){
                return true;
            }else{
                return false;
            }
        }
        console.log(isPositive(5));
        console.log(isPositive(-2));
        


        //isPositive 함수 호출할때.. 인수5를 매개변수로 전달해서 true 반환 받고 console.log로 출력

        //isPositive 함수 호출할때.. 인수-2를 매개변수로 전달해서 false반환 받고 console.log로 출력력


        //문제4. 매개변수로 한개의 숫자를 전달받아 전달받은 숫작 ㅏ짝수이면 true
        //      홀수라면 false 반환하는 기능의 isEven함수 정의
        //      호출할때 인수4 전달 후 출력ㄱㄱ
        //      호출할때 인수7 전달 후 출력 ㄱㄱㄱ

        function isEven(a){

            return a % 2 === 0;                 /*  if(a % 2 ==0){
                                                        return true;
                                                    }else{
                                                        return false; 
                                                    } */
        }console.log(isEven(4));
         console.log(isEven(7));

        //문제5. 숫자 1부터 매개변수n으로 전달받은 인수 하나의 합을 구하는 기능의 sumUpTO함수 정의
        //       기능 : 숫자 1부터 매개변수n으로 전달받은 인수까지의 합을 계산해서 반환합니다

        function sumUpTo(n){
                let sum = 0;                  // 숫자 1부터 매개변수로 전달 받은 값을 1씩 증가 시키면서 누적해서 저장할 누적변수 sum 선언언      
                     for(let i=1; + i<=n; i++){
                        sum = sum +i;             //숫자 1부터 ~ n매개변수로 전달 받은 숫자까지 반복해서 sum변수에 i변수값 누적적
                    }  
                    return sum;
        } console.log(sumUpTo(5));
        //sumUpTo 함수 호출할때 인수 5를 전달 
        //1+ 2 +3 +4 +5 ->15를 구해 반환 받아 출력

        




    </script>




</body>
</html>
