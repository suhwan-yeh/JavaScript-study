<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //화살표 => 함수 정의 후 호출해서 사용하는 문제
        
        //문제1. 매개 변수로 두개의 인수를 전달받아 두개의 인수값을 더한 결괏값을 반환하는 기능의 화살표 함수 만들어
        //       참고. 상수명은 add
        const add = (a,b) =>{ return a+b;};   // <-- 가독성 굳굳,  return이 한줄이면 중괄호, 'return' 없어도됨됨
        //ex) const add = (a,b) => a + b;
        //문제1.1 위 화살표 함수 호출할때 3,5 인수로 전달해서 8을 반환받아 출력 ㄱ
        console.log(add(3,5));

        //문제2. 매개변수로 두개의 인수를 전달받아 두 수중 큰값 하나를 반환하는 기능의 화살표 함수정의
        //상수명 mx
        //but 코드 기능 구현은 삼항 조건연산자식을 사용하여 첫번째 매개변수로 전달 받은 값이 
        //                                           두번째 매개변수로 전달 받은 값보다 크면?
        //                                           첫번째 매개변수로 전달 받은 값을 반환하고                                                
        //                                           그렇지 안ㅇ흐명 두번쨰 매개변수로 전달 받은 값을 반환
        
        //문제2.1 위 화살표 함수 호출할때 매개변수로 인수 7과 10을 각각 순서대로 전달해서 더 큰 인수값을 반환받아 출력 ㄱ
        
        const max = (a,b) => {

            return a>b ? a : b; 
            // const max = (a,b) => a>b? a : b; 이렇게 작성가능능

        };
        console.log(max(7,10));

        //문제3. 매개변수로 전달받는 하나의 인수값(숫자값) 양수인지 확인하는 기능의 화살표 함수로 정의
        //상수명 isPositive
        //문제3.1 위 화살표 함수 호출할때, 매개변수 5로 전달하면 true , -2전달하면 false 반환 받아와 각각 출력력
        const isPositive = (a) =>{

            return a >0;                    /*
                                                if(a>0){
                                                return true;
                                                }else{
                                                return false;
                                                }
                                            */
        // const isPositive = (a) => a>0; <- 이렇게도 적을 수 있음음
        };
        console.log(isPositive(5));
        console.log(isPositive(-2));

        //문제4. 숫자 1부터 ~ 매개변수 num으로 전달 받은 하나의 인수값(숫자값)까지의 합을 구해서 반환하는 기능의 화살표함수 정의
        //상수명 sumUpTo
        //문제4.1 위 화살표 함수 호출할때 매개변수 num으로 5 인수를 전달해서 1+2+3+4+5 전체 더한 결과값 15반환
        const sumUpTo = (num) =>{
            let sum = 0;
            for(let i = 1; i<=num; i++){

                sum = sum + i;
            }
            return sum;
        };
        console.log(sumUpTo(5));
        //문제5. 매개변수 num과 매개변수 count를 선언해서 화살표 함수로 정의 ㄱㄱ
        //상수명 repeatNumber
        //count 매개변수로 전달받은 숫자만큼 반복해서 num매개변수로 전달받은 값을 반복해서 console.log로 출력
        //문제5.1 위 화살표 함수를 호출 할 때 num매개변수에는 인수3을 전달하고 count매개변수에는 인수5를 전달
        //3을 5번 반복해서 출력 ㄱㄱㄱ
        const repeatNumber = (num, count) =>{
            for(let i = 1; i<=count; i++){
                console.log(num);
            }
        };
        repeatNumber(3,5);

        //문제6. 매개변수 num으로 하나의 숫자를 인수로 전달받아서... 3으로 나눈 나머지 값이 0이면 true 반환,
        //                                                    3의 배수가 아니면 false 반환하는 기능의 화살표 함수 정의의
        //상수명 isMultipleOfThree
        //문제6.1 위 화살표 함수 호출 할 떄 num매개변수에 9인수를 전달하면 true반환받아 이자리에 console.log 이용해서 출력 ㄱㄱ
        //                              num매개 변수에 10인수를 전달하면 false반환받아 이자리에 console.log 이용해서 출력 ㄱㄱ
        const isMultipleOfThree = (num) =>{

            return num % 3===0;

            //return num % 3 ===0 ? true : false;
            
            /*
            if(num %3===0){
                return true;
            }else{
                return false;
            }
            */
        };
        console.log(isMultipleOfThree(9));
        console.log(isMultipleOfThree(10));






    </script>
</body>
</html>
