<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 10; //전역변수 a 

        // 블럭문 , 중괄호 내부는 웬만하면 지역스코프프 - 변수값 초기화 할때 사용용
        {    
            // 지역스코프 영역에 지역변수 b
            let b = 20;
            console.log(`블록문 내부(지역 스코프)에서 a변수값 얻어 출력 : ${a}`);
            console.log(`블록문 내부(지역 스코프)에서 b변수값 얻어 출력 : ${b}`);
        } 

        console.log(`블록문 외부(전역 스코프)에서 a변수값 얻어 출력 : ${a}`);
        console.log(`블록문 외부(전역 스코프)에서 b변수값 얻어 출력 : ${b}`);
        // Uncaught ReferenceError: b is not defined






    </script>
</body>
</html>
