<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            0.함수 : 실행할 코드를 하나의 이름으로 선언해 두고
                    개발자가 코드 실행이 필요할때마다 그 이름으로 호출해서 코드 실행하는 문법

            1.함수 만들기(선언)

                function 함수명(){
                
                    실행할 코드;
                    실행할 코드2;
                    .........
                }

            2. 함수 호출

                함수명();

            3.'핵심' 
                - 함수 선언은 실행할 코드를 준비하는 단계.
                - 함수는 선언만 해서는 실행할 코드가 실행 안됨
                - 함수명 뒤에 ()를 붙여 함수명(); 이렇게 호출해야 실행할 코드가 실행됨.
        */

        // 1. 함수를 선언하지 않고 구구단 3단 직접 출력
        // 이러면 반복해야함함
        console.log("3 * 1 = 3 ");
        console.log("3 * 2 = 6 ");
        console.log("3 * 3 = 9 ");
        console.log("3 * 4 = 12 ");

        console.log("---------------------------------");

        // 2. for 반복문을 사용하면 반복되는 출력 코드를 한줄로 작성해서 줄일수있다.
        for(let i =1; i<=9; i++){

            console.log(`3 * ${3*i}`);
        }


        console.log("---------------------------------");

        //3. gugudan 함수 선언
        // 함수 선언은 실행할 코드 준비하는 단계
        function gugudan(){

            for(let i =1; i<=9; i++){
            console.log(`3 * ${i} = ${3*i}`);

             }           
        }

        // 4.gugudan 함수 호출
        gugudan();
        gugudan();
        






    </script>
</body>
</html>
