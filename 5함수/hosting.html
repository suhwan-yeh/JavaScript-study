<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        함수를 만드는 방법 3가지
        
        방법1. 선언문 function 방식으로 만들기

            function 함수명(){
                실행코드;
            }
        
        방법2. 표현식
            
            const 상수명 = function(){ 실행코드 };      <- 익명함수
            const 상수명 = function 함수명(){ 실행코드; }; <- 네이밍함수
        
        방법3. 화살표를 이용해 함수 만들기
            const 함수명 = (매개변수) => {실행코드;};
        */
        printHello();  // 이렇게도 호출가능. 밑에서 호출하는게 아니라 밑에있는 
                       // function이 위로 올라오게 되면서(호이스팅) 함수 호출가능.

        function printHello(){ //1. 함수 선언문 방식으로 함수 만들기
                console.log("hello");
        }



        console.log(number); // undifined 출력
        var number = 10;


    </script>
</body>
</html>
