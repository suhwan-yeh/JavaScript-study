<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //변수 만들때 let 또는 var 사용

       // var 변수명 = 10; // <- 자바스크립트의 옛날버전
       // let 변수명 = 100; // <- 자바스크립트 상위버전


       //블록문 { } 를 기준으로 전역스코프 영역에 전역변수 a만들기
       var a =10;
       {
        // 블록문 내부 영역 (지역 스코프)
        var b = 20; // <-- 지역변수 b
        console.log(`블록문 내부(지역 스코프)에서 a변수값 얻어 출력 : ${a}`);
        console.log(`블록문 내부(지역 스코프)에서 b변수값 얻어 출력 : ${b}`);
       }
       //블록문 외부 영역 전역 스코프 
       console.log(`블록문 외부(전역 스코프)에서 a변수값 얻어 출력 : ${a}`);

       // 전역 스코프에서 지역 스코프 b를 땡겨 썼는데 왜 가능하노?
       // why? var 키워드로 만든 변수값은 블록문 {} 내부에 작성 해놓을 지는 몰라도
       //      ${b} 변수값을 출력하는 시점에 웹브라우저 프로그램은 var b; 변수 선언코드를
       //      {  } 블록문을 위로 끌어 올려 선언해서 가능한거임
       console.log(`블록문 외부(전역역 스코프)에서 b변수값 얻어 출력 : ${b}`);


       console.log(c); // <- 변수값 출력 시점에 var c; 변수 선언만 이 줄 위로 끌어올리게 작성됨

       var c = 10; // <- 호이스팅 한다고 함함



    </script>
</body>
</html>
