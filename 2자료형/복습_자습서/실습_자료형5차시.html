<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>자료형 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : undefined 와 null, 자료형 종합

    - undefined : 변수를 만들고 값을 안 넣으면 자동으로 들어가는 '없음'
    - null      : 개발자가 "비어 있음"을 일부러 넣은 '없음'
    - typeof 로 각 값의 자료형을 확인할 수 있음
*/

// [1] 'item' 변수를 값 없이 만드세요. (= 부분 없이)
//     작성 공식: let 변수이름;
let item;


// [2] item 을 출력하세요. (값을 안 넣어 undefined)
console.log(item);            // 출력: undefined

// [3] 'weapon' 변수에 null 을 저장하세요. (일부러 비움)
//     작성 공식: let 변수이름 = null;
let weapon = null;

// [4] weapon 을 출력하세요.
console.log(weapon);          // 출력: null

// [5] 숫자 100의 자료형을 출력하세요.
//     작성 공식: console.log(typeof 값);
console.log(typeof 100);      // 출력: number

// [6] 문자열 "기사"의 자료형을 출력하세요.
console.log(typeof "기사");    // 출력: string

// [7] 불린 true 의 자료형을 출력하세요.
console.log(typeof true);     // 출력: boolean

// [8] item(undefined) 의 자료형을 출력하세요.
console.log(typeof item);     // 출력: undefined

// [9] 'gold' 변수에 숫자 0을 저장하세요. (0은 '없음'이 아니라 진짜 숫자)
let gold = 0;

// [10] gold 와 gold 의 자료형을 함께 출력하세요.
console.log(gold, typeof gold);   // 출력: 0 number
</script>
</body>
</html>
