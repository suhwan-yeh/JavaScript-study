<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>자료형 실습</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.8;font-size:16px}button{padding:8px 16px;font-size:15px;cursor:pointer;margin:4px}input{padding:8px;font-size:15px;width:250px}#out{margin-top:16px;padding:12px;background:#eef1fb;border-radius:8px;min-height:24px}</style>
</head>
<body>
<h3>출력 결과는 F12 → Console 탭에서 확인하세요. 주석 설명을 보며 직접 코드를 작성하세요.</h3>
<script>
/*
    주제 : [종합 미니 프로젝트] 캐릭터 스탯 시트 만들기

    자료형 단원에서 배운 모든 것을 사용합니다.
    - 숫자/문자열/불린 / 산술 연산(+,-,%) / 문자열 연결 / 비교 / typeof

    [완성 목표]
    캐릭터의 능력치를 자료형에 맞게 저장하고, 데미지를 계산하고,
    생존 여부를 비교로 판단해 스탯 시트를 콘솔에 출력합니다.


    미니 프로젝트 : 캐릭터 스탯 시트

   ┌────────────────────────────┐
   │ 이름: 기사 (string)         │
   │ HP : 100 (number)          │
   │ 공격력: 50  방어력: 20      │
   │ 데미지 = 공격-방어 = 30     │
   │ 생존: true (boolean)        │
   └────────────────────────────┘
*/

// ===== 1단계: 능력치 저장 (자료형 구분) =====

// [1] 'name' 에 문자열 "용감한기사"를 저장하세요.
//     작성 공식: let 변수이름 = "문자열";
let name = "용감한기사";

// [2] 'hp' 에 숫자 100을 저장하세요.
let hp = 100;

// [3] 'attack'(공격력)에 50, 'defense'(방어력)에 20을 저장하세요.
let attack = 50;             let defense = 20;

// ===== 2단계: 스탯 시트 출력 (문자열 연결) =====

// [4] "===== 스탯 시트 =====" 를 출력하세요.
//     작성 공식: console.log("문자열");
console.log("===== 스탯 시트 =====");

// [5] "이름: " 과 name 을 이어 붙여 출력하세요.
//     작성 공식: console.log("문자열" + 변수);
console.log("이름: " + name);

// [6] "HP: " 와 hp 를 이어 붙여 출력하세요.
console.log("HP: " + hp);

// [7] "공격력: " 과 attack 을 이어 붙여 출력하세요.
console.log("공격력: " + attack);

// ===== 3단계: 데미지 계산 (산술 연산) =====

// [8] 데미지 = 공격력 - 방어력 을 계산해 'damage' 에 저장하세요.
//     작성 공식: let 변수 = 값1 - 값2;
let damage   = attack - defense;
//           =   50   -  20;
//   30

// [9] "예상 데미지: " 와 damage 를 이어 붙여 출력하세요.
console.log("예상 데미지: " + damage);  //예상 데미지: 30

// ===== 4단계: 생존 판단 (비교 → 불린) =====

// [10] 몬스터에게 damage 만큼 맞았습니다! hp 에서 damage 를 빼서 다시 hp 에 저장하세요.
//      작성 공식: hp = hp - damage;
    hp    =  hp    - damage;
// [100]  = [100]  - [30];   <- 순서1.  100 - 30  계산 
// [100]  = [     70    ];   <- 순서2.    결과 70 을  = 대입기호를 이용해서  hp변수 메모리에 다시 저장 
// [70]                      


// [11] 남은 hp 를 출력하세요.
console.log("HP :" + hp);    // HP: 70 

// [12] 'isAlive' 에 hp 가 0보다 큰지 비교한 결과(불린 true 또는 false)를 저장하세요.
//      작성 공식: let 변수 = 값 > 0;
let isAlive =  hp > 0;
//          =  70 > 0;
//          =   true;
//   true

// [13] "생존 여부: " 와 isAlive 를 이어 붙여 출력하세요.
console.log("생존 여부:" + isAlive); //출력결과 ->  "생존여부 : true"

// [14] hp 와 isAlive 의 자료형을 각각 확인해 출력하세요.
//      작성 공식: console.log(typeof 값);
console.log(typeof hp,  typeof  isAlive);   // 출력: number boolean

// 완성! 스탯 시트가 콘솔에 출력되면 성공입니다.
</script>
</body>
</html>
