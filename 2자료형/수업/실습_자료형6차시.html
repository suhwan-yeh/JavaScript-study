<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>실습 - 자료형 6차시</title>
<style>body{font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.7}
.g{background:#fff7e8;border:1px solid #f0d999;border-radius:10px;padding:14px 16px;color:#6b4e16}
code{background:#eee;border-radius:4px;padding:1px 6px;font-family:monospace}</style></head><body>
  <h1>⌨️ 실습 - 캐릭터 스탯 시트 (미니 프로젝트)</h1>
  <div class="g"><b>준비:</b> 브라우저로 열고 <code>F12</code> → <b>콘솔</b> 탭을 켜두세요. 단원 전체를 활용한 종합 도전입니다!</div>
  <script>
// 주제 : [미니 프로젝트] 캐릭터 스탯 시트 만들기
//   자료형 단원 전체 활용: 숫자/문자열/불린, 산술(+,-), 문자열 연결, 비교, typeof
//   목표 : 능력치 저장 → 데미지 계산 → 생존 판정까지 스탯 시트 출력

// ===== 1단계: 능력치 저장 (자료형 구분) =====
// [1] name 에 문자열 "용감한기사" 를 저장하세요.
//     작성 공식: let 변수 = "문자열";  ↓
let name = "용감한기사";

// [2] hp 에 숫자 100 을 저장하세요.  ↓
let hp = 100;

// [3] attack 에 50, defense 에 20 을 저장하세요.  ↓
let attack = 50;
let defense = 20;

// ===== 2단계: 스탯 출력 (문자열 연결) =====
// [4] "===== 스탯 시트 =====" 를 출력하세요.
//     작성 공식: console.log("문자열");  ↓
console.log("===== 스탯 시트 =====");

// [5] "이름: " 과 name 을 이어 붙여 출력하세요.
//     작성 공식: console.log("문자열" + 변수);  ↓
console.log("이름: " + name);  
console.log(`이름: ${name}`);

// [6] "HP: " 와 hp 를 이어 붙여 출력하세요.  ↓
console.log(`HP: ${hp}`);

// [7] "공격력: " 과 attack 을 이어 붙여 출력하세요.  ↓
console.log(`공격력: ${attack}`);

// ===== 3단계: 데미지 계산 (산술) =====
// [8] 데미지 = 공격력 - 방어력 을 계산해 damage 에 저장하세요.
//     작성 공식: let 변수 = 값1 - 값2;  ↓
let damage = attack - defense;

// [9] "예상 데미지: " 와 damage 를 이어 붙여 출력하세요.  ↓
console.log(`예상 데미지: ${damage}`);

// ===== 4단계: 체력 감소 + 생존 판정 (비교) =====
// [10] 몬스터에게 맞았습니다! hp 에서 damage 를 빼서 다시 hp 에 저장하세요.
//      작성 공식: hp = hp - damage;  ↓
hp = hp - damage;

// [11] "남은 HP: " 와 hp 를 이어 붙여 출력하세요.  ↓
console.log(`남은 HP: ${hp}`);

// [12] 살아있는지(hp > 0) 결과를 isAlive 에 저장하세요.
//      작성 공식: let 변수 = 값 > 0;  ↓
let isAlive = hp > 0;

// [13] "생존 여부: " 와 isAlive 를 이어 붙여 출력하세요.  ↓
console.log(`생존 여부: ${isAlive}`);

// [14] hp 와 isAlive 의 자료형을 각각 출력하세요.
//      작성 공식: console.log(typeof 값, typeof 값);  ↓
console.log(typeof hp,  typeof isAlive);

// ✅ 스탯 시트 → 데미지30 → 남은HP70 → 생존 true 가 나오면 성공!


  </script></body></html>
